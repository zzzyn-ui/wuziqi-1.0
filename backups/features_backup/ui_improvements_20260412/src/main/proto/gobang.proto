syntax = "proto3";

package gobang;

option java_package = "com.gobang.protocol.protobuf";
option java_outer_classname = "GobangProto";

// ============== 消息类型枚举 ==============
enum MessageType {
  UNKNOWN = 0;

  // 认证相关
  AUTH_LOGIN = 1;
  AUTH_REGISTER = 2;
  AUTH_RESPONSE = 3;

  // 匹配相关
  MATCH_START = 10;
  MATCH_CANCEL = 11;
  MATCH_SUCCESS = 12;
  MATCH_FAILED = 13;
  MATCH_TIMEOUT = 14;

  // 游戏相关
  GAME_MOVE = 20;
  GAME_MOVE_RESULT = 21;
  GAME_STATE = 22;
  GAME_OVER = 23;
  GAME_RESIGN = 24;
  GAME_RECONNECT = 25;
  GAME_UNDO_REQUEST = 26;    // 悔棋请求
  GAME_UNDO_RESPONSE = 27;   // 悔棋响应
  GAME_UNDO_NOTIFY = 28;     // 悔棋通知

  // 观战相关
  OBSERVER_LIST = 30;
  OBSERVER_JOIN = 31;
  OBSERVER_LEAVE = 32;
  OBSERVER_COUNT = 33;

  // 聊天相关
  CHAT_SEND = 40;
  CHAT_RECEIVE = 41;
  CHAT_SYSTEM = 42;

  // 好友相关
  FRIEND_REQUEST = 50;
  FRIEND_ACCEPT = 51;
  FRIEND_REJECT = 52;
  FRIEND_REMOVE = 53;
  FRIEND_LIST = 54;
  FRIEND_ONLINE = 55;
  FRIEND_OFFLINE = 56;

  // 用户相关
  USER_INFO = 60;
  USER_STATS = 61;
  GAME_REPLAY_REQUEST = 70;  // 回放请求
  GAME_REPLAY_DATA = 71;     // 回放数据
}

// ============== 通用包装 ==============
message Packet {
  MessageType type = 1;
  int64 sequence_id = 2;
  int64 timestamp = 3;
  bytes body = 4;
}

// ============== 认证消息 ==============
message LoginRequest {
  string username = 1;
  string password = 2;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  string nickname = 4;
}

message AuthResponse {
  bool success = 1;
  string token = 2;
  string message = 3;
  UserInfo user_info = 4;
}

// ============== 匹配消息 ==============
message MatchRequest {
  int32 rating = 1;
  int32 timeout = 2;  // 匹配超时时间(秒)
  string mode = 3;    // 游戏模式: "casual"=休闲, "ranked"=竞技
}

message MatchSuccess {
  string room_id = 1;
  UserInfo opponent = 2;
  bool is_first = 3;  // 是否先手
}

message MatchFailed {
  string reason = 1;
}

// ============== 游戏消息 ==============
message MoveRequest {
  int32 x = 1;
  int32 y = 2;
}

message MoveResult {
  bool success = 1;
  string message = 2;
  GameState state = 3;
}

message GameState {
  enum Status {
    WAITING = 0;
    PLAYING = 1;
    FINISHED = 2;
  }
  Status status = 1;
  int32 current_player = 2;  // 1=黑, 2=白
  repeated int32 board = 3;  // 15x15, flattened
  int32 move_count = 4;
  int64 last_move_time = 5;
}

message GameOver {
  enum Reason {
    WIN = 0;
    LOSE = 1;
    DRAW = 2;
    RESIGN = 3;
    TIMEOUT = 4;
  }
  Reason reason = 1;
  string winner_id = 2;
  int32 rating_change = 3;
  repeated int32 final_board = 4;
}

// 悔棋请求
message UndoRequest {
}

// 悔棋响应（同意/拒绝）
message UndoResponse {
  bool accepted = 1;  // true=同意, false=拒绝
}

// 悔棋通知（广播给双方）
message UndoNotify {
  int32 x = 1;  // 被撤销的落子位置
  int32 y = 2;
  int32 color = 3;  // 被撤销的棋子颜色
}

// 回放请求
message ReplayRequest {
  string room_id = 1;  // 房间ID（或对局记录ID）
}

// 回放数据
message ReplayData {
  string room_id = 1;
  repeated MoveInfo moves = 2;  // 所有落子记录
  string winner_id = 3;
  int32 end_reason = 4;
  int64 created_at = 5;
}

// 单步落子信息
message MoveInfo {
  int32 x = 1;
  int32 y = 2;
  int32 color = 3;  // 1=黑, 2=白
  int64 timestamp = 4;
}

// ============== 观战消息 ==============
message ObserverJoin {
  string room_id = 1;
}

message ObserverLeave {
  string room_id = 1;
}

message ObserverList {
  repeated ObserverInfo observers = 1;
}

message ObserverCount {
  int32 count = 1;
}

// ============== 聊天消息 ==============
message ChatSend {
  string content = 1;
  string target_id = 2;  // 空为公屏,非空为私聊
}

message ChatReceive {
  string sender_id = 1;
  string sender_name = 2;
  string content = 3;
  int64 timestamp = 4;
  bool is_private = 5;
}

// ============== 好友消息 ==============
message FriendRequestMsg {
  string target_id = 1;
  string message = 2;
}

message FriendAcceptMsg {
  string request_id = 1;
}

message FriendRejectMsg {
  string request_id = 1;
}

message FriendRemoveMsg {
  string friend_id = 1;
}

message FriendListMsg {
  repeated FriendInfo friends = 1;
}

message FriendOnline {
  string friend_id = 1;
  string friend_name = 2;
}

message FriendOffline {
  string friend_id = 1;
}

// ============== 用户消息 ==============
message UserInfo {
  string user_id = 1;
  string username = 2;
  string nickname = 3;
  string avatar = 4;
  int32 rating = 5;
  int32 level = 6;
  int32 exp = 7;
  bool online = 8;
}

message UserStats {
  int32 total_games = 1;
  int32 wins = 2;
  int32 losses = 3;
  int32 draws = 4;
  double win_rate = 5;
  int32 max_rating = 6;
  int32 current_streak = 7;
  int32 max_streak = 8;
}

message ObserverInfo {
  string user_id = 1;
  string username = 2;
  string nickname = 3;
  int64 join_time = 4;
}

message FriendInfo {
  string user_id = 1;
  string username = 2;
  string nickname = 3;
  string avatar = 4;
  int32 rating = 5;
  bool online = 6;
  int64 last_online = 7;
}
