server:
  port: 8080

spring:
  application:
    name: gobang-server

  # 禁用静态资源服务，让前端由Vite开发服务器提供
  mvc:
    static-path-pattern: none
  web:
    resources:
      add-mappings: false

  # HTTP 编码配置
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/gobang?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.gobang.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: development-only-change-in-production-at-least-256-bits
  expiration: 604800  # 7天 (单位: 秒)
  issuer: gobang-server

# 游戏配置
game:
  board-size: 15
  win-count: 5
  match-timeout: 120  # 单步思考超时 (秒)
  room-expire-time: 600  # 房间过期时间 (秒)

# 匹配配置
match:
  rating-diff: 200  # 初始积分差异范围
  check-interval: 500  # 匹配检查间隔 (毫秒)
  max-queue-time: 300  # 最大等待时间 (秒)

# 日志配置
logging:
  level:
    com.gobang: debug
    org.springframework.web: info
    org.springframework.security: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
  file:
    path: ./logs
    max-size: 100MB
    max-history: 30
