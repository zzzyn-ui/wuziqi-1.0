version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: gobang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: gobang
      MYSQL_USER: gobang
      MYSQL_PASSWORD: gobang123
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - gobang-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: gobang-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass "redis123"
    networks:
      - gobang-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 五子棋游戏服务器
  gobang-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gobang-server
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      # 数据库配置
      DB_URL: jdbc:mysql://mysql:3306/gobang?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      DB_USERNAME: gobang
      DB_PASSWORD: gobang123

      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123

      # JWT配置
      JWT_SECRET: your-production-secret-key-change-this-immediately-at-least-256-bits
      JWT_EXPIRATION: 604800

      # 服务器配置
      SERVER_PORT: 9090
      NETTY_WORKER_THREADS: 4

      # 日志级别
      LOGGING_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gobang-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: gobang-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gobang-server
    networks:
      - gobang-network
    profiles:
      - with-nginx

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  gobang-network:
    driver: bridge
