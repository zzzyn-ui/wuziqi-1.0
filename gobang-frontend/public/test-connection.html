<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ccc;
        }
        .test-item.success {
            border-left-color: #4caf50;
        }
        .test-item.error {
            border-left-color: #f44336;
        }
        .test-item .status {
            font-weight: bold;
        }
        .test-item .details {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #1976D2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>五子棋服务器连接测试</h1>
    <button onclick="runTests()" id="testBtn">开始测试</button>

    <div id="results"></div>

    <script>
        async function runTests() {
            const results = document.getElementById('results');
            const btn = document.getElementById('testBtn');
            results.innerHTML = '';
            btn.disabled = true;
            btn.textContent = '测试中...';

            // 测试1: 健康检查API
            await test('健康检查 API', async () => {
                const response = await fetch('/api/health');
                const data = await response.json();
                if (data.status === 'ok') {
                    return `服务器正常运行<br>数据库: ${data.database}<br>在线用户: ${data.online_users || 0}`;
                }
                throw new Error('服务器状态异常: ' + data.status);
            });

            // 测试2: WebSocket连接
            await test('WebSocket 连接', async () => {
                return new Promise((resolve, reject) => {
                    const ws = new WebSocket('ws://' + window.location.host + '/ws');
                    let resolved = false;

                    ws.onopen = () => {
                        if (!resolved) {
                            resolved = true;
                            ws.close();
                            resolve('WebSocket 连接成功');
                        }
                    };

                    ws.onerror = (error) => {
                        if (!resolved) {
                            resolved = true;
                            reject(new Error('WebSocket 连接失败'));
                        }
                    };

                    setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            reject(new Error('WebSocket 连接超时'));
                        }
                    }, 5000);
                });
            });

            // 测试3: 数据库连接
            await test('数据库用户表', async () => {
                const response = await fetch('/api/leaderboard?limit=5');
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                const data = await response.json();
                if (data.success && data.data) {
                    return `用户表正常<br>前5名玩家:<pre>${JSON.stringify(data.data, null, 2)}</pre>`;
                }
                throw new Error('无法获取排行榜数据');
            });

            btn.disabled = false;
            btn.textContent = '重新测试';
        }

        async function test(name, testFn) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'test-item';
            div.innerHTML = `<div class="status">⏳ ${name} - 测试中...</div>`;
            results.appendChild(div);

            try {
                const result = await testFn();
                div.className = 'test-item success';
                div.innerHTML = `<div class="status">✅ ${name} - 成功</div><div class="details">${result}</div>`;
            } catch (error) {
                div.className = 'test-item error';
                div.innerHTML = `<div class="status">❌ ${name} - 失败</div><div class="details">${error.message}</div>`;
            }
        }

        // 页面加载后自动运行测试
        window.onload = () => {
            console.log('测试页面加载完成');
            setTimeout(runTests, 500);
        };
    </script>
</body>
</html>
