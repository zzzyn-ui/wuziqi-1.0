<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匹配队列测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .status {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .status-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .status-card h3 {
            color: #666;
            margin-bottom: 10px;
        }
        .status-card .count {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #004085;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        #log {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .log-info { color: #0066cc; }
        .log-success { color: #28a745; }
        .log-error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 匹配队列测试工具</h1>

        <div class="info">
            <strong>功能说明：</strong><br>
            此页面用于验证休闲模式和竞技模式是否完全隔离<br>
            • 休闲模式队列：match:q:c<br>
            • 竞技模式队列：match:q:r<br>
            • 两个队列应该互不干扰
        </div>

        <div class="status">
            <div class="status-card">
                <h3>休闲模式队列</h3>
                <div class="count" id="casualCount">-</div>
            </div>
            <div class="status-card">
                <h3>竞技模式队列</h3>
                <div class="count" id="rankedCount">-</div>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-primary" onclick="checkQueues()">🔍 检查队列状态</button>
            <button class="btn-secondary" onclick="goBack()">🏠 返回首页</button>
        </div>

        <div id="log"></div>
    </div>

    <script>
        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            log.insertBefore(entry, log.firstChild);
        }

        async function checkQueues() {
            addLog('正在检查队列状态...', 'info');

            try {
                // 调用API获取匹配状态
                const response = await fetch('/api/match/status');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    const casual = data.data?.casual_waiting || 0;
                    const ranked = data.data?.ranked_waiting || 0;

                    document.getElementById('casualCount').textContent = casual;
                    document.getElementById('rankedCount').textContent = ranked;

                    addLog(`休闲队列: ${casual} 人`, 'success');
                    addLog(`竞技队列: ${ranked} 人`, 'success');

                    if (casual > 0 && ranked > 0) {
                        addLog('⚠️ 两个队列都有玩家，但不会跨模式匹配', 'info');
                    }
                } else {
                    throw new Error(data.message || '获取状态失败');
                }
            } catch (error) {
                addLog(`错误: ${error.message}`, 'error');
                addLog('提示: 请确保服务器正在运行', 'info');

                // 设置默认值
                document.getElementById('casualCount').textContent = '?';
                document.getElementById('rankedCount').textContent = '?';
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // 页面加载时自动检查一次
        window.onload = () => {
            addLog('页面加载完成', 'success');
            addLog('点击"检查队列状态"按钮查看当前队列信息', 'info');
        };
    </script>
</body>
</html>
