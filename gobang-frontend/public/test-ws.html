<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 连接测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; }
        .section {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .section h2 { color: #0f3460; margin-bottom: 15px; }
        .info {
            background: #0f3460;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 14px;
        }
        .info.success { background: #1b4332; }
        .info.error { background: #4a1c1c; }
        .info.warning { background: #4a3c1c; }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover { background: #c73659; }
        #log {
            background: #0a0a15;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log-time { color: #888; }
        .log-info { color: #4ec9b0; }
        .log-success { color: #6a9955; }
        .log-error { color: #f48771; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket 连接诊断</h1>

        <div class="section">
            <h2>环境信息</h2>
            <div class="info">当前URL: <span id="currentUrl"></span></div>
            <div class="info">协议: <span id="protocol"></span></div>
            <div class="info">主机名: <span id="hostname"></span></div>
            <div class="info">端口: <span id="port"></span></div>
            <div class="info">Host (含端口): <span id="host"></span></div>
        </div>

        <div class="section">
            <h2>WebSocket URL 计算</h2>
            <div class="info">计算出的 WS URL: <span id="wsUrl"></span></div>
            <div class="info">是否本地: <span id="isLocal"></span></div>
        </div>

        <div class="section">
            <h2>连接测试</h2>
            <button onclick="testConnection()">🔗 测试连接</button>
            <button onclick="clearLog()">🗑️ 清空日志</button>
            <div class="info" id="status">状态: 未测试</div>
        </div>

        <div class="section">
            <h2>日志</h2>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // 显示环境信息
        document.getElementById('currentUrl').textContent = window.location.href;
        document.getElementById('protocol').textContent = window.location.protocol;
        document.getElementById('hostname').textContent = window.location.hostname;
        document.getElementById('port').textContent = window.location.port || '(默认)';
        document.getElementById('host').textContent = window.location.host;

        // 计算 WebSocket URL
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const hostname = window.location.hostname;
        const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
        let wsUrl;
        if (isLocalhost) {
            wsUrl = `${protocol}//${hostname}:8083/ws`;
        } else {
            wsUrl = `${protocol}//${window.location.host}/ws`;
        }

        document.getElementById('wsUrl').textContent = wsUrl;
        document.getElementById('isLocal').textContent = isLocalhost ? '是 (使用8083端口)' : '否 (使用当前host)';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            logDiv.insertBefore(line, logDiv.firstChild);
        }

        function setStatus(text, type = '') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = 'info ' + type;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function testConnection() {
            clearLog();
            log('=== 开始 WebSocket 连接测试 ===', 'info');
            log(`目标 URL: ${wsUrl}`, 'info');

            const token = localStorage.getItem('authToken') || localStorage.getItem('gobang_token');
            log(`Token: ${token ? '存在 (' + token.substring(0, 20) + '...)' : '不存在'}`, token ? 'success' : 'warning');

            setStatus('正在连接...', 'warning');

            try {
                log('创建 WebSocket 对象...', 'info');
                const ws = new WebSocket(wsUrl);
                log(`WebSocket 创建成功, readyState: ${ws.readyState}`, 'success');

                // 设置超时
                const timeout = setTimeout(() => {
                    if (ws.readyState === WebSocket.CONNECTING) {
                        log('❌ 连接超时 (10秒)', 'error');
                        setStatus('连接超时', 'error');
                        ws.close();
                    }
                }, 10000);

                ws.onopen = () => {
                    clearTimeout(timeout);
                    log('✅ WebSocket 连接成功!', 'success');
                    log(`readyState: ${ws.readyState} (OPEN)`, 'success');
                    setStatus('已连接', 'success');

                    // 发送认证消息
                    if (token) {
                        try {
                            const authMsg = { type: 100, body: { token: token } }; // TOKEN_AUTH
                            ws.send(JSON.stringify(authMsg));
                            log('已发送认证消息', 'info');
                        } catch (e) {
                            log(`发送认证消息失败: ${e.message}`, 'error');
                        }
                    }

                    // 3秒后关闭
                    setTimeout(() => {
                        log('测试完成，关闭连接', 'info');
                        ws.close();
                    }, 3000);
                };

                ws.onmessage = (event) => {
                    log(`📨 收到消息: ${event.data}`, 'info');
                    try {
                        const msg = JSON.parse(event.data);
                        log(`解析消息类型: ${msg.type}`, 'info');
                        if (msg.type === 100) { // TOKEN_AUTH 响应
                            log(`认证结果: ${msg.success ? '成功' : '失败'}`, msg.success ? 'success' : 'error');
                        }
                    } catch (e) {
                        log('解析消息失败 (非JSON)', 'warning');
                    }
                };

                ws.onerror = (error) => {
                    clearTimeout(timeout);
                    log('❌ WebSocket 错误!', 'error');
                    log(`readyState: ${ws.readyState}`, 'error');
                    log(`错误对象: ${JSON.stringify(error)}`, 'error');
                    setStatus('连接错误', 'error');
                };

                ws.onclose = (event) => {
                    log(`🔌 WebSocket 关闭`, 'warning');
                    log(`code: ${event.code}, reason: ${event.reason || '(无)'}`, 'warning');
                    log(`wasClean: ${event.wasClean}`, 'warning');
                };

            } catch (e) {
                log(`❌ 创建 WebSocket 失败: ${e.message}`, 'error');
                setStatus('创建失败', 'error');
            }
        }

        // 页面加载后自动测试
        window.onload = () => {
            log('页面加载完成', 'info');
            log('点击"测试连接"按钮开始测试', 'info');
        };
    </script>
</body>
</html>
