<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋调试测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4a9eff;
            margin-bottom: 30px;
        }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .section h2 {
            color: #4a9eff;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .btn {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .btn:hover {
            background: #357abd;
        }
        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #000; }
        .btn-warning:hover { background: #e0a800; }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 10px;
        }
        .status.connected {
            background: #28a745;
        }
        .status.disconnected {
            background: #dc3545;
        }

        .log {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 5px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            height: 200px;
            overflow-y: auto;
            color: #0f0;
        }
        .log-entry {
            margin: 2px 0;
            padding: 2px 0;
        }
        .log-time {
            color: #888;
            margin-right: 10px;
        }
        .log-info { color: #4a9eff; }
        .log-error { color: #ff6b6b; }
        .log-success { color: #51cf66; }
        .log-warn { color: #ffd93d; }

        .test-result {
            display: inline-block;
            margin-left: 10px;
            font-weight: bold;
        }
        .test-result.pass { color: #28a745; }
        .test-result.fail { color: #dc3545; }

        .input-group {
            margin: 10px 0;
        }
        .input-group label {
            display: inline-block;
            width: 150px;
        }
        .input-group input {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.3);
            color: #eee;
            width: 200px;
        }

        .board-container {
            display: inline-block;
            margin: 10px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            gap: 1px;
            background: #dcb35c;
            padding: 10px;
            border-radius: 5px;
        }
        .cell {
            width: 30px;
            height: 30px;
            background: #dcb35c;
            cursor: pointer;
            position: relative;
        }
        .cell:hover {
            background: #c4a835;
        }
        .cell.black::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: #000;
            border-radius: 50%;
            top: 3px;
            left: 3px;
        }
        .cell.white::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 50%;
            top: 3px;
            left: 3px;
        }
        .cell.last-move::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff0;
            border-radius: 50%;
            top: 10px;
            left: 10px;
            z-index: 1;
        }

        .info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        .info-item {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
        }
        .info-label {
            color: #888;
            font-size: 12px;
        }
        .info-value {
            font-size: 16px;
            color: #4a9eff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 五子棋调试测试页面</h1>

        <!-- WebSocket连接状态 -->
        <div class="section">
            <h2>WebSocket 连接</h2>
            <span class="status disconnected" id="wsStatus">未连接</span>
            <div class="input-group">
                <label>房间号:</label>
                <input type="text" id="roomIdInput" placeholder="输入房间号">
                <button class="btn" onclick="connectRoom()">连接房间</button>
                <button class="btn btn-warning" onclick="disconnect()">断开</button>
            </div>
        </div>

        <!-- 游戏状态 -->
        <div class="section">
            <h2>游戏状态</h2>
            <div class="info">
                <div class="info-item">
                    <div class="info-label">游戏状态</div>
                    <div class="info-value" id="gameState">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">当前玩家</div>
                    <div class="info-value" id="currentPlayer">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">倒计时</div>
                    <div class="info-value" id="timer">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">移动数</div>
                    <div class="info-value" id="moveCount">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">剩余时间</div>
                    <div class="info-value" id="remainingTime">-</div>
                </div>
            </div>
        </div>

        <!-- 测试按钮 -->
        <div class="section">
            <h2>功能测试</h2>
            <button class="btn" onclick="testMove()">测试落子</button>
            <span class="test-result" id="moveResult"></span>
            <br><br>
            <button class="btn" onclick="testUndo()">测试悔棋</button>
            <span class="test-result" id="undoResult"></span>
            <br><br>
            <button class="btn" onclick="testRematch()">测试再来一局</button>
            <span class="test-result" id="rematchResult"></span>
            <br><br>
            <button class="btn btn-success" onclick="runAllTests()">运行所有测试</button>
        </div>

        <!-- 测试棋盘 -->
        <div class="section">
            <h2>测试棋盘 (点击落子)</h2>
            <div class="board-container">
                <div class="board" id="testBoard"></div>
            </div>
        </div>

        <!-- 日志 -->
        <div class="section">
            <h2>日志</h2>
            <button class="btn btn-warning" onclick="clearLog()">清空日志</button>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let roomId = '';
        let myColor = 0; // 0=未分配, 1=黑, 2=白
        let board = new Array(225).fill(0);
        let gameState = null;

        // 初始化测试棋盘
        function initTestBoard() {
            const boardEl = document.getElementById('testBoard');
            boardEl.innerHTML = '';
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.onclick = () => testClickCell(i);
                boardEl.appendChild(cell);
            }
        }

        function testClickCell(index) {
            const x = Math.floor(index / 15);
            const y = index % 15;
            log(`点击棋盘: (${x}, ${y})`, 'info');

            if (ws && ws.readyState === WebSocket.OPEN && myColor !== 0 && gameState === 'PLAYING') {
                ws.send(JSON.stringify({
                    type: 30,
                    sequenceId: Date.now(),
                    timestamp: Date.now(),
                    body: {
                        x: x,
                        y: y
                    }
                }));
                log(`发送落子请求: (${x}, ${y})`, 'info');
            }
        }

        function renderBoard() {
            const cells = document.querySelectorAll('#testBoard .cell');
            cells.forEach((cell, i) => {
                cell.className = 'cell';
                if (board[i] === 1) cell.classList.add('black');
                if (board[i] === 2) cell.classList.add('white');
            });
        }

        function connectRoom() {
            roomId = document.getElementById('roomIdInput').value.trim();
            if (!roomId) {
                log('请输入房间号', 'error');
                return;
            }

            // 连接WebSocket
            const wsUrl = `ws://localhost:8083/ws`;
            log(`连接到: ${wsUrl}`, 'info');

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log('WebSocket已连接', 'success');
                updateWsStatus(true);

                // 发送认证token
                const token = localStorage.getItem('auth_token');
                if (token) {
                    ws.send(JSON.stringify({
                        type: 1,
                        sequence_id: Date.now(),
                        timestamp: Date.now(),
                        body: { token: token }
                    }));
                }

                // 发送重连消息
                setTimeout(() => {
                    ws.send(JSON.stringify({
                        type: 25,
                        sequenceId: Date.now(),
                        timestamp: Date.now(),
                        body: { room_id: roomId }
                    }));
                }, 500);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                log(`收到消息: type=${data.type}`, 'info');
                handleMessage(data);
            };

            ws.onerror = (error) => {
                log(`WebSocket错误: ${error}`, 'error');
            };

            ws.onclose = () => {
                log('WebSocket已断开', 'warn');
                updateWsStatus(false);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            updateWsStatus(false);
        }

        function updateWsStatus(connected) {
            const statusEl = document.getElementById('wsStatus');
            if (connected) {
                statusEl.textContent = '已连接';
                statusEl.className = 'status connected';
            } else {
                statusEl.textContent = '未连接';
                statusEl.className = 'status disconnected';
            }
        }

        function handleMessage(data) {
            switch(data.type) {
                case 3: // AUTH_RESULT
                    log(`认证结果: ${data.body.success ? '成功' : '失败'}`, data.body.success ? 'success' : 'error');
                    break;
                case 24: // ROOM_JOINED
                    log(`加入房间: ${data.body.room_id}`, 'success');
                    myColor = data.body.my_color || 0;
                    log(`我的颜色: ${myColor === 1 ? '黑' : myColor === 2 ? '白' : '未分配'}`, 'info');
                    updateGameState(data.body);
                    break;
                case 28: // GAME_STATE
                    log(`游戏状态更新: ${data.body.game_state}`, 'info');
                    updateGameState(data.body);
                    break;
                case 31: // GAME_MOVE_RESULT
                    log(`落子结果: ${data.body.success ? '成功' : '失败'}`, data.body.success ? 'success' : 'error');
                    if (data.body.state) {
                        updateGameState(data.body.state);
                    }
                    break;
                case 33: // GAME_OVER
                    log(`游戏结束: winner=${data.body.winner_id}`, 'info');
                    break;
                case 26: // GAME_UNDO_REQUEST
                    log('收到悔棋请求', 'warn');
                    break;
                case 27: // GAME_UNDO_RESPONSE
                    log(`悔棋响应: ${data.body.success ? '同意' : '拒绝'}`, data.body.success ? 'success' : 'error');
                    break;
                case 80: // GAME_REMATCH_REQUEST
                    log('收到再来一局请求', 'warn');
                    break;
                case 81: // GAME_REMATCH_RESPONSE
                    log(`再来一局响应: ${data.body.accepted ? '同意' : '拒绝'}`, data.body.accepted ? 'success' : 'warn');
                    break;
                case 82: // GAME_REMATCH_START
                    log('再来一局开始', 'success');
                    break;
            }
        }

        function updateGameState(state) {
            gameState = state.game_state;

            // 更新UI
            document.getElementById('gameState').textContent =
                state.game_state === 'WAITING' ? '等待中' :
                state.game_state === 'PLAYING' ? '进行中' :
                state.game_state === 'FINISHED' ? '已结束' : '-';

            document.getElementById('currentPlayer').textContent =
                state.current_player === 1 ? '黑方' :
                state.current_player === 2 ? '白方' : '-';

            document.getElementById('moveCount').textContent = state.move_count || 0;

            if (state.remaining_time !== undefined) {
                const minutes = Math.floor(state.remaining_time / 60);
                const seconds = state.remaining_time % 60;
                document.getElementById('remainingTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                document.getElementById('timer').textContent = `⏱️ ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }

            // 更新棋盘
            if (state.board) {
                board = state.board.slice();
                renderBoard();
            }
        }

        // 测试功能
        async function testMove() {
            const resultEl = document.getElementById('moveResult');
            resultEl.textContent = '测试中...';

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                resultEl.textContent = '❌ 未连接';
                resultEl.className = 'test-result fail';
                return;
            }

            try {
                // 找一个空位
                const emptyIndex = board.findIndex(x => x === 0);
                if (emptyIndex === -1 {
                    resultEl.textContent = '❌ 棋盘已满';
                    resultEl.className = 'test-result fail';
                    return;
                }

                const x = Math.floor(emptyIndex / 15);
                const y = emptyIndex % 15;

                ws.send(JSON.stringify({
                    type: 30,
                    sequenceId: Date.now(),
                    timestamp: Date.now(),
                    body: { x, y }
                }));

                log(`测试落子: (${x}, ${y})`, 'info');
                resultEl.textContent = '✅ 已发送';
                resultEl.className = 'test-result pass';

                // 等待响应
                await waitForResponse();
            } catch (e) {
                resultEl.textContent = `❌ 错误: ${e.message}`;
                resultEl.className = 'test-result fail';
            }
        }

        async function testUndo() {
            const resultEl = document.getElementById('undoResult');
            resultEl.textContent = '测试中...';

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                resultEl.textContent = '❌ 未连接';
                resultEl.className = 'test-result fail';
                return;
            }

            try {
                ws.send(JSON.stringify({
                    type: 26,
                    sequenceId: Date.now(),
                    timestamp: Date.now()
                }));

                log('测试悔棋请求', 'info');
                resultEl.textContent = '✅ 已发送';
                resultEl.className = 'test-result pass';

                await waitForResponse();
            } catch (e) {
                resultEl.textContent = `❌ 错误: ${e.message}`;
                resultEl.className = 'test-result fail';
            }
        }

        async function testRematch() {
            const resultEl = document.getElementById('rematchResult');
            resultEl.textContent = '测试中...';

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                resultEl.textContent = '❌ 未连接';
                resultEl.className = 'test-result fail';
                return;
            }

            try {
                ws.send(JSON.stringify({
                    type: 80,
                    sequenceId: Date.now(),
                    timestamp: Date.now()
                }));

                log('测试再来一局请求', 'info');
                resultEl.textContent = '✅ 已发送';
                resultEl.className = 'test-result pass';

                await waitForResponse();
            } catch (e) {
                resultEl.textContent = `❌ 错误: ${e.message}`;
                resultEl.className = 'test-result fail';
            }
        }

        async function runAllTests() {
            clearLog();
            log('=== 开始运行所有测试 ===', 'info');

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ 请先连接房间', 'error');
                return;
            }

            // 等待游戏状态
            await sleep(1000);

            // 测试1: 落子
            log('测试1: 落子功能', 'info');
            const emptyIndex = board.findIndex(x => x === 0);
            if (emptyIndex !== -1) {
                const x = Math.floor(emptyIndex / 15);
                const y = emptyIndex % 15;
                ws.send(JSON.stringify({
                    type: 30,
                    sequenceId: Date.now(),
                    timestamp: Date.now(),
                    body: { x, y }
                }));
                await sleep(500);
            }

            // 测试2: 悔棋
            log('测试2: 悔棋功能', 'info');
            ws.send(JSON.stringify({
                type: 26,
                sequenceId: Date.now(),
                timestamp: Date.now()
            }));
            await sleep(500);

            // 测试3: 再来一局
            log('测试3: 再来一局功能', 'info');
            ws.send(JSON.stringify({
                type: 80,
                sequenceId: Date.now(),
                timestamp: Date.now()
            }));

            log('=== 测试完成 ===', 'info');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function waitForResponse() {
            await sleep(1000);
        }

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            logEl.insertBefore(entry, logEl.firstChild);

            // 限制日志条数
            while (logEl.children.length > 100) {
                logEl.removeChild(logEl.lastChild);
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // 初始化
        initTestBoard();

        // 自动填充房间号（如果有）
        const urlParams = new URLSearchParams(window.location.search);
        const roomParam = urlParams.get('room');
        if (roomParam) {
            document.getElementById('roomIdInput').value = roomParam;
        }

        log('测试页面已加载', 'info');
    </script>
</body>
</html>
