<!DOCTYPE html>
<html>
<head>
    <title>WebSocket 测试</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@7/lib/stomp.min.js"></script>
</head>
<body>
    <h1>WebSocket 连接测试</h1>
    <div>
        <button onclick="connect()">连接</button>
        <button onclick="disconnect()">断开</button>
        <button onclick="sendTest()">发送测试消息</button>
    </div>
    <div id="log" style="border:1px solid #ccc; padding:10px; margin-top:10px; height:300px; overflow-y:auto;"></div>

    <script>
        let client = null;
        let token = localStorage.getItem('token') || 'test-token';

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + msg + '</div>';
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        function connect() {
            log('开始连接到 ws://localhost:8083/ws');
            log('使用Token: ' + (token ? token.substring(0, 20) + '...' : 'none'));

            // 使用SockJS
            const socket = new SockJS('http://localhost:8083/ws');
            log('SockJS 创建成功: ' + socket);

            client = Stomp.over(socket);

            client.debug = function(str) {
                log('STOMP: ' + str);
            };

            client.connect(
                { Authorization: 'Bearer ' + token },
                function(frame) {
                    log('✅ 连接成功!');
                    log('Frame: ' + JSON.stringify(frame));

                    // 订阅测试
                    client.subscribe('/topic/test', function(message) {
                        log('收到消息: ' + message.body);
                    });
                    log('订阅 /topic/test 成功');
                },
                function(error) {
                    log('❌ 连接失败: ' + error);
                }
            );
        }

        function disconnect() {
            if (client) {
                client.disconnect(function() {
                    log('断开连接');
                });
            }
        }

        function sendTest() {
            if (client && client.connected) {
                client.send('/app/test', {}, JSON.stringify({ action: 'test' }));
                log('发送测试消息');
            } else {
                log('未连接');
            }
        }
    </script>
</body>
</html>
