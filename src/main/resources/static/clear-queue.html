<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除匹配队列</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-clear-cache {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-clear-cache:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }
        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 匹配队列管理</h1>

        <div class="info">
            <strong>功能说明：</strong><br>
            • 清除浏览器缓存：清除localStorage中的登录凭证<br>
            • 强制刷新页面：清除页面缓存并重新加载
        </div>

        <div class="button-group">
            <button class="btn-clear-cache" onclick="clearBrowserCache()">
                🗑️ 清除浏览器缓存
            </button>
            <button class="btn-clear-cache" onclick="forceReload()">
                🔄 强制刷新页面
            </button>
            <button class="btn-back" onclick="goBack()">
                🏠 返回首页
            </button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = isSuccess ? 'success' : 'error';
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';

            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 3000);
        }

        function clearBrowserCache() {
            if (confirm('确定要清除浏览器缓存吗？这将删除您的登录信息。')) {
                // 清除localStorage
                localStorage.clear();

                // 清除sessionStorage
                sessionStorage.clear();

                showResult('✅ 浏览器缓存已清除！请重新登录。', true);

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }
        }

        function forceReload() {
            // 强制刷新页面，绕过缓存
            window.location.reload(true);
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
