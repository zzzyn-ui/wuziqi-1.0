<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 五子棋对战平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8dc 50%, #ffd4c4 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(255, 107, 53, 0.15);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #ff6b35;
        }
        .header h1 {
            color: #ff6b35;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .contact-card {
            background: #fff8f5;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
        }
        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
        }
        .contact-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .contact-card h3 {
            color: #ff6b35;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .contact-card p {
            color: #666;
            line-height: 1.6;
        }
        .form-section {
            margin-top: 40px;
        }
        .form-section h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b35;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        .submit-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 24px 20px;
                border-radius: 12px;
            }

            .header {
                margin-bottom: 24px;
                padding-bottom: 15px;
            }

            .header h1 {
                font-size: 24px;
            }

            .contact-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .contact-card {
                padding: 20px;
            }

            .contact-icon {
                font-size: 40px;
            }

            .contact-card h3 {
                font-size: 16px;
            }

            .contact-card p {
                font-size: 14px;
            }

            .form-section h2 {
                font-size: 20px;
            }

            .form-group input,
            .form-group textarea {
                padding: 10px 12px;
                font-size: 14px;
            }

            .back-btn {
                padding: 10px 24px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 20px 16px;
                border-radius: 10px;
            }

            .header {
                margin-bottom: 20px;
                padding-bottom: 12px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header p {
                font-size: 13px;
            }

            .contact-card {
                padding: 16px;
            }

            .contact-icon {
                font-size: 36px;
                margin-bottom: 12px;
            }

            .contact-card h3 {
                font-size: 15px;
            }

            .contact-card p {
                font-size: 13px;
            }

            .form-section {
                margin-top: 30px;
            }

            .form-section h2 {
                font-size: 18px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-group input,
            .form-group textarea {
                padding: 9px 11px;
                font-size: 13px;
            }

            .back-btn {
                padding: 8px 20px;
                font-size: 13px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 联系我们</h1>
            <p>我们随时为您服务</p>
        </div>

        <div class="contact-grid">
            <div class="contact-card">
                <div class="contact-icon">📧</div>
                <h3>邮箱</h3>
                <p>support@gobang.com</p>
                <p>help@gobang.com</p>
            </div>
            <div class="contact-card">
                <div class="contact-icon">💬</div>
                <h3>微信</h3>
                <p>gobang_official</p>
                <p>客服在线时间<br>9:00-22:00</p>
            </div>
            <div class="contact-card">
                <div class="contact-icon">🐧</div>
                <h3>QQ群</h3>
                <p>官方群：123456789</p>
                <p>交流群：987654321</p>
            </div>
            <div class="contact-card">
                <div class="contact-icon">📱</div>
                <h3>客服热线</h3>
                <p>400-123-4567</p>
                <p>工作日 9:00-18:00</p>
            </div>
        </div>

        <div class="form-section">
            <h2>📝 在线留言</h2>
            <form id="contactForm" onsubmit="submitForm(event)">
                <div class="form-group">
                    <label>您的称呼</label>
                    <input type="text" id="name" placeholder="请输入您的昵称或姓名" required>
                </div>
                <div class="form-group">
                    <label>联系方式</label>
                    <input type="text" id="contact" placeholder="邮箱、手机号或QQ" required>
                </div>
                <div class="form-group">
                    <label>反馈类型</label>
                    <select id="type" style="width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 8px;">
                        <option value="bug">问题反馈</option>
                        <option value="suggestion">功能建议</option>
                        <option value="account">账号问题</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>详细描述</label>
                    <textarea id="message" placeholder="请详细描述您的问题或建议..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">提交反馈</button>
            </form>
        </div>

        <button class="back-btn" onclick="window.location.href='index.html'">返回首页</button>
    </div>

    <script>
        function submitForm(e) {
            e.preventDefault();
            alert('感谢您的反馈！我们会尽快处理您的留言。');
            document.getElementById('contactForm').reset();
        }
    </script>
</body>
</html>
