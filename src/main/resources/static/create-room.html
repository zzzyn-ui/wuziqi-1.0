<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建房间 - 五子棋对战平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8dc 50%, #ffd4c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .room-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 80px rgba(255, 107, 53, 0.2);
            overflow: hidden;
            position: relative;
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: #ff6b35;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .back-btn:hover {
            background: white;
            transform: translateX(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .room-header {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c61 50%, #ffa07a 100%);
            padding: 24px;
            text-align: center;
            color: white;
        }

        .room-header h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .room-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .room-content {
            padding: 32px 24px;
        }

        .room-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }

        .room-id-display {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b35;
            letter-spacing: 4px;
            margin: 16px 0;
            font-family: 'Courier New', monospace;
        }

        .room-label {
            color: #999;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .copy-box {
            background: white;
            border: 2px dashed #ff8c61;
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .room-url {
            flex: 1;
            color: #666;
            font-size: 12px;
            word-break: break-all;
            margin-right: 12px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .copy-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .qr-section {
            margin: 20px 0;
        }

        .qr-placeholder {
            width: 180px;
            height: 180px;
            margin: 0 auto;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
        }

        .player-status {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }

        .player-slot {
            background: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .player-slot.empty {
            border: 2px dashed #ddd;
        }

        .player-slot.filled {
            border: 2px solid #ff8c61;
            background: #fff5f0;
        }

        .player-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 8px;
        }

        .player-slot.empty .player-avatar {
            background: #e9ecef;
            color: #ccc;
        }

        .player-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .player-role {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .waiting-animation {
            text-align: center;
            padding: 20px;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #ff8c61;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .waiting-text {
            color: #666;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #eee;
        }

        .btn-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .btn-danger:hover {
            background: #f5c6cb;
        }

        /* 游戏开始弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            animation: modalIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .modal-text {
            color: #999;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
        }

        .modal-btn.secondary {
            background: #f5f5f5;
            color: #666;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .room-container {
                border-radius: 16px;
            }

            .room-header {
                padding: 16px;
            }

            .room-header h1 {
                font-size: 18px;
            }

            .room-content {
                padding: 20px 16px;
            }

            .room-id-display {
                font-size: 36px;
            }

            .player-status {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .player-avatar {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }

            .btn {
                padding: 14px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .room-id-display {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .copy-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .qr-placeholder {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="room-container">
        <button class="back-btn" onclick="goBack()" title="返回">←</button>
        <div class="room-header">
            <h1>创建房间</h1>
            <p>邀请好友一起对战</p>
        </div>

        <div class="room-content">
            <div class="room-card">
                <div class="room-label">房间号</div>
                <div class="room-id-display" id="roomId">------</div>
                <div class="room-hint">等待好友加入房间...</div>
            </div>

            <!-- 调试信息 -->
            <div style="margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 8px; font-size: 12px; font-family: monospace; color: #666;">
                <div>连接状态: <span id="wsStatus">未连接</span></div>
                <div>最后消息: <span id="lastMessage">-</span></div>
            </div>

            <div style="margin-top: 24px;">
                <button class="btn btn-danger" onclick="cancelRoom()" style="width: 100%; padding: 16px; font-size: 16px;">取消房间</button>
            </div>
        </div>
    </div>

    <!-- 加入房间模态框 -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <div class="modal-icon">🎮</div>
            <div class="modal-title">好友已加入</div>
            <div class="modal-text">正在进入游戏...</div>
        </div>
    </div>

    <script>
        let ws = null;
        let sequenceId = 0;
        let currentUser = null;
        let roomId = null;
        let opponentJoined = false;

        const MessageType = {
            UNKNOWN: 0,
            CREATE_ROOM: 16,
            JOIN_ROOM: 17,
            ROOM_JOINED: 20,
            ROOM_PLAYER_LEFT: 29,
            GAME_STATE: 32
        };

        // 初始化
        function init() {
            // 获取用户信息 - 使用 authToken 代替 currentUser
            const token = localStorage.getItem('authToken');
            if (!token) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }

            // 创建一个简单的用户对象
            currentUser = { nickname: '玩家' };

            // 房间号初始显示为六个横杠，等待服务器分配
            document.getElementById('roomId').textContent = '------';

            // 连接WebSocket并创建房间
            connect();
        }

        function generateRoomId() {
            // 只生成6位随机数字
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += Math.floor(Math.random() * 10).toString();
            }
            return result;
        }

        function connect() {
            // 动态获取WebSocket地址 - 支持本地开发和ngrok穿透
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const hostname = window.location.hostname;
            const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
            let wsUrl;
            if (isLocalhost) {
                wsUrl = `${protocol}//${hostname}:8083/ws`;
            } else {
                wsUrl = `${protocol}//${window.location.host}/ws`;
            }
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                document.getElementById('wsStatus').textContent = '已连接';
                document.getElementById('wsStatus').style.color = '#28a745';

                // 先发送认证消息
                const token = localStorage.getItem('authToken');
                console.log('Token found:', token ? 'Yes' : 'No');

                if (token) {
                    sendMessage(100, { token: token }); // TOKEN_AUTH
                    console.log('Auth message sent');
                }
                // 然后创建房间
                setTimeout(() => {
                    sendMessage(MessageType.CREATE_ROOM, {
                        user_info: currentUser
                    });
                    console.log('CREATE_ROOM message sent');
                }, 300);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    console.log('Received:', msg);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Message error:', e);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                document.getElementById('wsStatus').textContent = '已断开';
                document.getElementById('wsStatus').style.color = '#dc3545';
                // 不再显示 alert，因为跳转时会正常断开
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                document.getElementById('wsStatus').textContent = '错误';
                document.getElementById('wsStatus').style.color = '#dc3545';
                document.getElementById('lastMessage').textContent = 'WebSocket错误';
            };
        }

        function sendMessage(type, body = null) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return false;
            }

            const packet = {
                type: type,
                sequence_id: ++sequenceId,  // 使用下划线命名匹配后端
                timestamp: Date.now()
            };

            if (body) {
                packet.body = body;
            }

            console.log('Sending message:', packet);
            ws.send(JSON.stringify(packet));
            return true;
        }

        function handleMessage(msg) {
            console.log('=== handleMessage ===');
            console.log('Full message:', JSON.stringify(msg));
            console.log('Message type:', msg.type);
            console.log('Message body:', msg.body);

            // 更新调试信息
            const lastMsgEl = document.getElementById('lastMessage');
            if (lastMsgEl) {
                lastMsgEl.textContent = `type=${msg.type}`;
            }

            switch (msg.type) {
                case MessageType.CREATE_ROOM:
                    // 创建房间成功，更新房间号
                    console.log('CREATE_ROOM response received');
                    console.log('msg.body:', msg.body);
                    console.log('msg.body.success:', msg.body?.success);
                    console.log('msg.body.room_id:', msg.body?.room_id);

                    if (msg.body && msg.body.success) {
                        console.log('Room created successfully:', msg.body.room_id);
                        roomId = msg.body.room_id;
                        console.log('Setting roomId to:', roomId);
                        const roomIdElement = document.getElementById('roomId');
                        console.log('roomId element:', roomIdElement);
                        if (roomIdElement) {
                            roomIdElement.textContent = roomId;
                            console.log('Room ID updated in DOM to:', roomId);
                            lastMsgEl.textContent = `房间号: ${roomId}`;
                        }
                    } else {
                        console.error('Create room failed:', msg.body?.message);
                        lastMsgEl.textContent = `创建失败: ${msg.body?.message || '未知错误'}`;
                    }
                    break;
                case MessageType.GAME_STATE:
                    // 收到游戏状态，显示模态框然后跳转
                    console.log('Game state received, redirecting to game...');
                    if (msg.body && msg.body.room_id) {
                        opponentJoined = true;  // 标记为已加入，避免断开时显示 alert
                        // 显示模态框
                        document.getElementById('joinModal').classList.add('show');
                        // 延迟跳转，让用户看到提示
                        setTimeout(() => {
                            window.location.href = `game.html?room=${msg.body.room_id}&my_color=${msg.body.my_color || 1}`;
                        }, 1000);
                    }
                    break;
                case 100: // TOKEN_AUTH 响应
                    console.log('Auth response:', msg.body);
                    lastMsgEl.textContent = `认证: ${msg.body?.success ? '成功' : '失败'}`;
                    break;
                default:
                    console.log('Unhandled message type:', msg.type, 'Message:', msg);
                    lastMsgEl.textContent = `未知消息: type=${msg.type}`;
            }
        }

        function cancelRoom() {
            if (confirm('确定要取消房间吗？')) {
                if (ws) {
                    ws.close();
                }
                window.location.href = 'index.html';
            }
        }

        function goBack() {
            if (confirm('确定要返回吗？房间将被取消')) {
                if (ws) {
                    ws.close();
                }
                window.location.href = 'index.html';
            }
        }

        // 页面卸载时清理
        window.onbeforeunload = function() {
            if (ws) {
                ws.close();
            }
        };

        // 初始化
        window.onload = init;
    </script>
</body>
</html>
