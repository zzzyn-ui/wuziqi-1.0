<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>五子棋在线对战 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8cc 50%, #ffd9a8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 粒子背景画布 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 左右对称动画区 */
        .side-decoration {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 150px;
            height: 400px;
            z-index: 1;
            pointer-events: none;
        }

        .side-decoration.left {
            left: 5%;
        }

        .side-decoration.right {
            right: 5%;
        }

        .decoration-item {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 149, 0, 0.3), rgba(255, 179, 71, 0.1));
            animation: float 4s ease-in-out infinite;
        }

        .decoration-item:nth-child(1) {
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s;
        }

        .decoration-item:nth-child(2) {
            top: 35%;
            left: 30%;
            width: 40px;
            height: 40px;
            animation-delay: 0.5s;
        }

        .decoration-item:nth-child(3) {
            top: 60%;
            left: 70%;
            width: 80px;
            height: 80px;
            animation-delay: 1s;
        }

        .decoration-item:nth-child(4) {
            top: 85%;
            left: 40%;
            width: 50px;
            height: 50px;
            animation-delay: 1.5s;
        }

        .side-decoration.right .decoration-item {
            left: auto;
            right: 0;
            transform: translateX(50%);
        }

        .side-decoration.right .decoration-item:nth-child(2) {
            right: 30%;
            left: auto;
        }

        .side-decoration.right .decoration-item:nth-child(3) {
            right: 70%;
            left: auto;
        }

        .side-decoration.right .decoration-item:nth-child(4) {
            right: 40%;
            left: auto;
        }

        @keyframes float {
            0%, 100% {
                transform: translateX(-50%) translateY(0) scale(1);
                opacity: 0.6;
            }
            50% {
                transform: translateX(-50%) translateY(-20px) scale(1.1);
                opacity: 1;
            }
        }

        .side-decoration.right .decoration-item {
            animation-name: floatRight;
        }

        @keyframes floatRight {
            0%, 100% {
                transform: translateX(50%) translateY(0) scale(1);
                opacity: 0.6;
            }
            50% {
                transform: translateX(50%) translateY(-20px) scale(1.1);
                opacity: 1;
            }
        }

        /* 装饰线条 */
        .decoration-line {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(255, 149, 0, 0.5), transparent);
            animation: linePulse 3s ease-in-out infinite;
        }

        .side-decoration.left .decoration-line {
            left: 50%;
            top: 0;
        }

        .side-decoration.right .decoration-line {
            right: 50%;
            bottom: 0;
        }

        @keyframes linePulse {
            0%, 100% {
                opacity: 0.3;
                height: 100px;
            }
            50% {
                opacity: 0.8;
                height: 150px;
            }
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.15);
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 2;
            overflow: hidden;
            animation: containerFadeIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff9500, #ffb347, #ff9500);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
            animation: logoFloat 3s ease-in-out infinite;
            position: relative;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            background: inherit;
            filter: blur(15px);
            opacity: 0.5;
            z-index: -1;
        }

        .logo-icon svg {
            width: 48px;
            height: 48px;
            fill: white;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #ff6b35;
            font-size: 16px;
            text-align: center;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            margin-bottom: 28px;
            background: #fff5e6;
            border-radius: 12px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px 24px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab:hover {
            color: #ff6b35;
        }

        .tab.active {
            background: white;
            color: #ff6b35;
            box-shadow: 0 2px 8px rgba(255, 107, 53, 0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccc;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #ff6b35;
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        input:focus + .input-icon {
            color: #ff6b35;
            transform: translateY(-50%) scale(1.1);
        }

        input::placeholder {
            color: #bbb;
        }

        button.primary-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
        }

        button.primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(255, 107, 53, 0.4);
        }

        button.primary-btn:active {
            transform: translateY(0);
        }

        button.primary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .message.info {
            background: linear-gradient(135deg, #d1ecf1, #bee5eb);
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #ccc;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ddd, transparent);
        }

        .divider span {
            padding: 0 16px;
        }

        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #999;
        }

        .footer-links a {
            color: #ff6b35;
            text-decoration: none;
            margin: 0 8px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #ff8c61;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .guest-login {
            background: #fff5e6;
            color: #ff6b35;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .guest-login:hover {
            background: #ffe8cc;
            color: #ff8c61;
        }

        /* 动画效果 */
        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-10px) rotate(5deg);
            }
            75% {
                transform: translateY(-5px) rotate(-5deg);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .side-decoration {
                display: none;
            }

            .container {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .logo-icon {
                width: 60px;
                height: 60px;
            }

            .logo-icon svg {
                width: 36px;
                height: 36px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .tab {
                padding: 10px 20px;
                font-size: 14px;
            }

            input {
                padding: 12px 12px 12px 40px;
                font-size: 14px;
            }

            button.primary-btn {
                padding: 13px;
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 24px 20px;
                border-radius: 16px;
            }

            .logo-icon {
                width: 52px;
                height: 52px;
            }

            .logo-icon svg {
                width: 32px;
                height: 32px;
            }

            h1 {
                font-size: 20px;
            }

            .subtitle {
                font-size: 13px;
            }

            .logo {
                margin-bottom: 24px;
            }

            .tabs {
                margin-bottom: 20px;
            }

            .tab {
                padding: 8px 16px;
                font-size: 13px;
            }

            label {
                font-size: 13px;
            }

            input {
                padding: 11px 11px 11px 38px;
                font-size: 14px;
            }

            button.primary-btn {
                padding: 12px;
                font-size: 14px;
            }

            .guest-login {
                padding: 10px;
                font-size: 13px;
            }

            .footer-links {
                font-size: 12px;
            }
        }

        /* 密码强度指示器 */
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
            width: 0%;
        }

        .strength-1 .strength-fill { width: 25%; background: #ff4444; }
        .strength-2 .strength-fill { width: 50%; background: #ffaa00; }
        .strength-3 .strength-fill { width: 75%; background: #ffcc00; }
        .strength-4 .strength-fill { width: 100%; background: #00cc00; }

        .strength-text {
            margin-top: 4px;
            font-size: 12px;
        }

        .strength-1 .strength-text { color: #ff4444; }
        .strength-2 .strength-text { color: #ffaa00; }
        .strength-3 .strength-text { color: #ffcc00; }
        .strength-4 .strength-text { color: #00cc00; }
    </style>
</head>
<body>
    <!-- 粒子背景画布 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 左侧装饰区 -->
    <div class="side-decoration left">
        <div class="decoration-item"></div>
        <div class="decoration-item"></div>
        <div class="decoration-item"></div>
        <div class="decoration-item"></div>
        <div class="decoration-line"></div>
    </div>

    <!-- 右侧装饰区 -->
    <div class="side-decoration right">
        <div class="decoration-item"></div>
        <div class="decoration-item"></div>
        <div class="decoration-item"></div>
        <div class="decoration-item"></div>
        <div class="decoration-line"></div>
    </div>

    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <!-- 棋盘网格 -->
                    <g fill="none" stroke="white" stroke-width="1.5">
                        <line x1="4" y1="4" x2="20" y2="4"/>
                        <line x1="4" y1="8" x2="20" y2="8"/>
                        <line x1="4" y1="12" x2="20" y2="12"/>
                        <line x1="4" y1="16" x2="20" y2="16"/>
                        <line x1="4" y1="20" x2="20" y2="20"/>
                        <line x1="4" y1="4" x2="4" y2="20"/>
                        <line x1="8" y1="4" x2="8" y2="20"/>
                        <line x1="12" y1="4" x2="12" y2="20"/>
                        <line x1="16" y1="4" x2="16" y2="20"/>
                        <line x1="20" y1="4" x2="20" y2="20"/>
                    </g>
                    <!-- 棋子 -->
                    <circle cx="8" cy="8" r="2" fill="white"/>
                    <circle cx="12" cy="12" r="2" fill="white"/>
                    <circle cx="16" cy="16" r="2" fill="white"/>
                </svg>
            </div>
            <h1>五子棋在线对战</h1>
            <p class="subtitle">五子棋对弈，有胆你就来</p>
            <p class="server-status" id="serverStatus" style="font-size: 12px; color: #999; margin-top: 8px;">检查服务器状态中...</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">登录</button>
            <button class="tab" onclick="showTab('register')">注册</button>
        </div>

        <div id="messageArea"></div>

        <!-- 登录表单 -->
        <div id="loginForm" class="form active">
            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" maxlength="16">
                </div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="请输入密码" maxlength="32">
                </div>
            </div>
            <button class="primary-btn" onclick="login()" id="loginBtn">登录</button>

            <div class="divider">
                <span>或</span>
            </div>

            <button class="guest-login" onclick="guestLogin()">游客模式体验</button>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="form">
            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="regUsername" placeholder="3-16位字母或数字" maxlength="16">
                </div>
            </div>
            <div class="form-group">
                <label>昵称</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="regNickname" placeholder="显示给其他玩家的名称" maxlength="20">
                </div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="regPassword" placeholder="至少6位，建议包含大小写字母、数字" maxlength="32" oninput="checkPasswordStrength()">
                </div>
                <div id="passwordStrength" class="password-strength"></div>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" maxlength="32">
                </div>
            </div>
            <button class="primary-btn" onclick="register()" id="registerBtn">注册</button>
        </div>

        <div class="footer-links">
            <a href="#" onclick="showHelp()">帮助</a>
            |
            <a href="#" onclick="showAbout()">关于</a>
        </div>
    </div>

    <script>
        // ==================== 粒子背景动画 ====================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 8 + 3;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5 - 0.3;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = `rgba(255, ${Math.floor(Math.random() * 100 + 100)}, ${Math.floor(Math.random() * 50 + 50)}, ${this.opacity})`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.002;

                if (this.opacity <= 0 || this.y < -20 || this.y > canvas.height + 20) {
                    this.reset();
                    this.y = canvas.height + 20;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(/[^,]+(?=\))/, this.opacity);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.floor((canvas.width * canvas.height) / 15000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animateParticles();
        // ==================== 粒子背景动画结束 ====================

        // ==================== 原有登录逻辑 ====================
        let ws = null;
        let sequenceId = 0;
        let authToken = null;
        let currentUser = null;
        let heartbeatInterval = null;
        let reconnectTimeout = null;
        let isManualClose = false;

        const MessageType = {
            UNKNOWN: 0,
            AUTH_LOGIN: 1,
            AUTH_REGISTER: 2,
            AUTH_RESPONSE: 3,
            MATCH_START: 10,
            MATCH_CANCEL: 11,
            MATCH_SUCCESS: 12,
            MATCH_FAILED: 13,
            GAME_MOVE: 20,
            GAME_MOVE_RESULT: 21,
            GAME_STATE: 22,
            GAME_OVER: 23,
            GAME_RESIGN: 24,
            GAME_RECONNECT: 25
        };

        // 检查是否已登录
        function checkLogin() {
            const token = localStorage.getItem('authToken');
            const user = localStorage.getItem('currentUser');
            if (token && user) {
                authToken = token;
                currentUser = JSON.parse(user);
                window.location.href = 'index.html';
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            hideMessage();
        }

        function connect() {
            return new Promise((resolve, reject) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    console.log('✓ WebSocket 已连接');
                    resolve();
                    return;
                }

                if (ws) {
                    ws.close();
                }

                // 清除旧的心跳和重连定时器
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                if (reconnectTimeout) clearTimeout(reconnectTimeout);

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const hostname = window.location.hostname;
                const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
                let wsUrl;
                if (isLocalhost) {
                    wsUrl = `${protocol}//${hostname}:8083/ws`;
                } else {
                    wsUrl = `${protocol}//${window.location.host}/ws`;
                }
                console.log('正在连接 WebSocket:', wsUrl);

                try {
                    ws = new WebSocket(wsUrl);

                    ws.onopen = () => {
                        console.log('✓ WebSocket 连接成功');
                        document.getElementById('serverStatus').innerHTML =
                            '<span style="color: #4caf50;">● 在线 (已连接)</span>';

                        // 启动心跳：每30秒发送一次ping
                        heartbeatInterval = setInterval(() => {
                            if (ws && ws.readyState === WebSocket.OPEN) {
                                ws.send(JSON.stringify({ type: 'ping', timestamp: Date.now() }));
                                console.log('发送心跳 ping');
                            }
                        }, 30000);

                        resolve();
                    };

                    ws.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            console.log('收到消息:', msg);
                            handleMessage(msg);
                        } catch (e) {
                            // 忽略ping/pong等非JSON消息
                            if (event.data !== 'pong' && event.data !== 'ping') {
                                console.error('消息解析错误:', e);
                                console.log('原始消息:', event.data);
                            }
                        }
                    };

                    ws.onclose = (event) => {
                        console.log('WebSocket 连接关闭, code:', event.code, 'reason:', event.reason || '无');
                        document.getElementById('serverStatus').innerHTML =
                            '<span style="color: #ff9800;">● 连接已断开</span>';

                        // 清除心跳
                        if (heartbeatInterval) {
                            clearInterval(heartbeatInterval);
                            heartbeatInterval = null;
                        }

                        // 自动重连（如果不是手动关闭）
                        if (!isManualClose) {
                            console.log('3秒后尝试重连...');
                            reconnectTimeout = setTimeout(() => {
                                console.log('正在重连...');
                                connect().catch(err => console.error('重连失败:', err));
                            }, 3000);
                        }
                    };

                    ws.onerror = (error) => {
                        console.error('WebSocket 错误:', error);
                        document.getElementById('serverStatus').innerHTML =
                            '<span style="color: #f44336;">● 连接错误</span>';
                        reject(new Error('WebSocket 连接失败'));
                    };

                    setTimeout(() => {
                        if (ws.readyState !== WebSocket.OPEN) {
                            reject(new Error('连接超时（5秒）'));
                        }
                    }, 5000);
                } catch (error) {
                    console.error('创建 WebSocket 失败:', error);
                    reject(error);
                }
            });
        }

        function sendMessage(type, body = null) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showMessage('请先连接服务器', 'error');
                return false;
            }

            const packet = {
                type: type,
                sequenceId: ++sequenceId,
                timestamp: Date.now()
            };

            if (body) {
                packet.body = body;
            }

            ws.send(JSON.stringify(packet));
            return true;
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case MessageType.AUTH_RESPONSE:
                    handleAuthResponse(msg);
                    break;
                default:
                    break;
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username) {
                showMessage('请输入用户名', 'error');
                return;
            }
            if (!password) {
                showMessage('请输入密码', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>连接中...';

            try {
                console.log('=== 开始登录流程 ===');
                console.log('用户名:', username);

                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    console.log('WebSocket 未连接，正在连接...');
                    await connect();
                }

                btn.innerHTML = '<span class="loading"></span>登录中...';

                console.log('发送登录请求...');
                const success = sendMessage(MessageType.AUTH_LOGIN, {
                    username: username,
                    password: password
                });

                if (success) {
                    console.log('✓ 登录请求已发送');
                } else {
                    throw new Error('发送登录请求失败');
                }

            } catch (error) {
                console.error('登录错误:', error);
                showMessage('连接服务器失败：' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const strengthDiv = document.getElementById('passwordStrength');

            if (!password) {
                strengthDiv.classList.remove('show');
                return;
            }

            strengthDiv.classList.add('show');

            // 计算密码强度
            let score = 0;

            // 长度
            if (password.length >= 6) score++;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;

            // 包含小写字母
            if (/[a-z]/.test(password)) score++;

            // 包含大写字母
            if (/[A-Z]/.test(password)) score++;

            // 包含数字
            if (/\d/.test(password)) score++;

            // 包含特殊字符
            if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?]/.test(password)) score++;

            // 更新显示
            const strengthClass = Math.min(score, 4);
            const strengthTexts = ['', '弱', '一般', '中等', '强'];
            const strengthColors = ['', '#ff4444', '#ffaa00', '#ffcc00', '#00cc00'];

            strengthDiv.className = 'password-strength show strength-' + strengthClass;
            strengthDiv.innerHTML = `
                <div class="strength-bar">
                    <div class="strength-fill"></div>
                </div>
                <div class="strength-text">${strengthTexts[strengthClass]}</div>
            `;
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            if (!username) {
                showMessage('请输入用户名', 'error');
                return;
            }
            if (username.length < 3 || username.length > 16) {
                showMessage('用户名长度必须在3-16位之间', 'error');
                return;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showMessage('用户名只能包含字母、数字和下划线', 'error');
                return;
            }
            if (!nickname) {
                showMessage('请输入昵称', 'error');
                return;
            }
            if (!password) {
                showMessage('请输入密码', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('密码长度不能少于6位', 'error');
                return;
            }
            if (password !== passwordConfirm) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            // 检查密码强度（仅警告，不阻止注册）
            if (password.length < 8 || !/[A-Z]/.test(password) || !/\d/.test(password)) {
                console.log('提示：建议使用更复杂的密码（包含大小写字母、数字和特殊字符）');
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>连接中...';

            try {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    await connect();
                }

                btn.innerHTML = '<span class="loading"></span>注册中...';

                sendMessage(MessageType.AUTH_REGISTER, {
                    username: username,
                    nickname: nickname,
                    password: password
                });

            } catch (error) {
                console.error('Register error:', error);
                showMessage('连接服务器失败，请确保服务器已启动', 'error');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }

        function guestLogin() {
            const guestId = -(Math.floor(Math.random() * 1000000) + 1000000);
            const guestUser = {
                user_id: guestId,
                username: 'guest_' + Math.abs(guestId),
                nickname: '游客' + Math.abs(guestId % 1000),
                rating: 1200,
                level: 1,
                exp: 0
            };
            localStorage.setItem('currentUser', JSON.stringify(guestUser));
            window.location.href = 'index.html';
        }

        function handleAuthResponse(msg) {
            console.log('=== 收到认证响应 ===');
            console.log('完整响应:', JSON.stringify(msg, null, 2));

            const btn = document.getElementById('loginBtn');
            const regBtn = document.getElementById('registerBtn');

            btn.disabled = false;
            btn.textContent = '登录';
            regBtn.disabled = false;
            regBtn.textContent = '注册';

            if (msg.body && msg.body.success) {
                console.log('✓ 认证成功');

                currentUser = msg.body.user_info;
                authToken = msg.body.token;

                console.log('用户信息:', currentUser);
                console.log('Token 长度:', authToken ? authToken.length : 0);

                if (currentUser && currentUser.user_id) {
                    currentUser.user_id = parseInt(currentUser.user_id);
                }
                if (currentUser && currentUser.rating) {
                    currentUser.rating = parseInt(currentUser.rating);
                }
                if (currentUser && currentUser.level) {
                    currentUser.level = parseInt(currentUser.level);
                }
                if (currentUser && currentUser.exp) {
                    currentUser.exp = parseInt(currentUser.exp);
                }

                localStorage.setItem('authToken', authToken);
                localStorage.setItem('token', authToken);  // 同时存储 token，供其他页面使用
                localStorage.setItem('currentUser', JSON.stringify(currentUser));

                console.log('✓ 用户信息已保存到 localStorage');

                showMessage('登录成功！正在跳转...', 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                console.error('✗ 认证失败');
                console.error('错误消息:', msg.body ? msg.body.message : '未知错误');
                showMessage(msg.body?.message || '认证失败，请检查用户名和密码', 'error');
            }
        }

        function showMessage(text, type = 'info') {
            const area = document.getElementById('messageArea');
            area.innerHTML = '';
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type} show`;
            msgDiv.textContent = text;
            area.appendChild(msgDiv);

            setTimeout(() => {
                hideMessage();
            }, 5000);
        }

        function hideMessage() {
            document.getElementById('messageArea').innerHTML = '';
        }

        function showHelp() {
            showMessage('联系管理员获取帮助', 'info');
        }

        function showAbout() {
            showMessage('五子棋在线对战 v1.0', 'info');
        }

        async function checkServerStatus() {
            try {
                const protocol = window.location.protocol;
                const hostname = window.location.hostname;
                const apiPort = '8083';
                const response = await fetch(`${protocol}//${hostname}:${apiPort}/api/health`);

                if (response.ok) {
                    const json = await response.json();
                    console.log('Server health check:', json);

                    if (json.success && json.data && json.data.status === 'ok') {
                        return { connected: true, data: json.data };
                    } else {
                        return { connected: false, error: 'Server status: ' + (json.data?.status || 'unknown') };
                    }
                } else {
                    return { connected: false, error: 'HTTP ' + response.status };
                }
            } catch (error) {
                console.error('Health check failed:', error);
                return { connected: false, error: error.message };
            }
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const loginForm = document.getElementById('loginForm');
                if (loginForm.classList.contains('active')) {
                    login();
                } else {
                    register();
                }
            }
        });

        window.onload = async function() {
            window.addEventListener('error', function(e) {
                if (e.message && e.message.includes('Could not establish connection')) {
                    e.preventDefault();
                }
            }, true);

            checkLogin();

            console.log('=== 五子棋登录页面 ===');
            console.log('当前URL:', window.location.href);
            console.log('检查服务器状态...');

            try {
                const status = await checkServerStatus();

                if (status.connected) {
                    console.log('✓ 服务器运行正常');
                    console.log('  数据库状态:', status.data.database);
                    console.log('  在线用户:', status.data.online_users || 0);

                    document.getElementById('serverStatus').innerHTML =
                        '<span style="color: #4caf50;">● 服务器在线</span> (' +
                        (status.data.online_users || 0) + ' 人在线)';

                    console.log('正在连接 WebSocket...');
                    connect().catch((error) => {
                        console.warn('WebSocket 连接失败:', error);
                        showMessage('WebSocket 连接失败，请检查服务器是否正在运行', 'error');
                        document.getElementById('serverStatus').innerHTML =
                            '<span style="color: #ff9800;">● WebSocket 连接失败</span>';
                    });
                } else {
                    console.error('✗ 服务器连接失败:', status.error);
                    showMessage('服务器连接失败：' + status.error + '。请确保服务器正在运行。', 'error');
                    document.getElementById('serverStatus').innerHTML =
                        '<span style="color: #f44336;">● 服务器离线</span>';
                }
            } catch (error) {
                console.error('服务器状态检查异常:', error);
                document.getElementById('serverStatus').innerHTML =
                    '<span style="color: #f44336;">● 连接失败</span>';
            }
        };

        window.onbeforeunload = function() {
            if (ws) {
                ws.close();
            }
        };
    </script>
</body>
