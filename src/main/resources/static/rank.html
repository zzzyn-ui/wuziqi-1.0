<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - 五子棋对战平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8dc 50%, #ffd4c4 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .rank-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            padding: 8px 16px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .back-btn:hover {
            background: #eee;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .tab:hover {
            background: #fff5e6;
            color: #ff6b35;
        }

        .tab.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
        }

        .rank-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .rank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .rank-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .online-count {
            font-size: 14px;
            color: #28a745;
        }

        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .rank-item:hover {
            background: #fff5e6;
            transform: translateX(4px);
        }

        .rank-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }

        .rank-number.gold {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #9a7b00;
        }

        .rank-number.silver {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
            color: #666;
        }

        .rank-number.bronze {
            background: linear-gradient(135deg, #cd7f32, #e8a867);
            color: #8b5a2b;
        }

        .rank-number.normal {
            background: #e9ecef;
            color: #666;
        }

        .player-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
        }

        .player-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #28a745;
            border: 2px solid white;
            border-radius: 50%;
        }

        .player-avatar.offline::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #999;
            border: 2px solid white;
            border-radius: 50%;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .player-stats {
            font-size: 12px;
            color: #999;
        }

        .player-rating {
            font-size: 18px;
            font-weight: bold;
            color: #ff6b35;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }

        .online-badge.online {
            background: #d4edda;
            color: #155724;
        }

        .online-badge.offline {
            background: #f8f9fa;
            color: #999;
        }

        /* 实时更新指示器 */
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #28a745;
            background: #d4edda;
            padding: 6px 12px;
            border-radius: 12px;
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .refresh-text {
            font-weight: 500;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .rank-container {
                padding: 10px;
                padding-top: 20px;
            }

            .header h1 {
                font-size: 18px;
            }

            .back-btn {
                padding: 6px 12px;
                font-size: 13px;
            }

            .tabs {
                gap: 8px;
            }

            .tab {
                padding: 10px 8px;
                font-size: 13px;
            }

            .rank-card {
                padding: 16px;
            }

            .rank-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .rank-item {
                padding: 12px;
                gap: 10px;
            }

            .rank-number {
                width: 30px;
                height: 30px;
                font-size: 12px;
            }

            .player-avatar {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }

            .player-name {
                font-size: 14px;
            }

            .player-stats {
                font-size: 11px;
            }

            .player-rating {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .rank-container {
                padding: 5px;
                padding-top: 10px;
            }

            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 16px;
            }

            .tab {
                padding: 8px 6px;
                font-size: 12px;
            }

            .rank-card {
                padding: 12px;
            }

            .rank-title {
                font-size: 16px;
            }

            .online-count {
                font-size: 12px;
            }

            .rank-item {
                padding: 10px;
                gap: 8px;
            }

            .rank-number {
                width: 26px;
                height: 26px;
                font-size: 11px;
            }

            .player-avatar {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }

            .player-rating {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="rank-container">
        <div class="header">
            <h1>🏆 排行榜</h1>
            <button class="back-btn" onclick="goBack()">← 返回</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('daily')">日榜</button>
            <button class="tab" onclick="switchTab('weekly')">周榜</button>
            <button class="tab" onclick="switchTab('monthly')">月榜</button>
            <button class="tab" onclick="switchTab('all')">总榜</button>
        </div>

        <div class="rank-card">
            <div class="rank-header">
                <div class="rank-title" id="rankTitle">日榜排名</div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="refresh-indicator" id="refreshIndicator">
                        <span class="refresh-dot"></span>
                        <span class="refresh-text">实时更新中</span>
                    </div>
                    <div class="online-count">
                        <span style="color: #28a745;">●</span>
                        <span id="onlinePlayers">0</span> 人在线
                    </div>
                </div>
            </div>

            <div class="rank-list" id="rankList">
                <!-- 排行榜数据将在这里动态加载 -->
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentTab = 'daily';
        let rankData = [];
        let refreshInterval = null;
        let lastUpdateTime = 0;

        function init() {
            // 获取用户信息
            const userStr = localStorage.getItem('currentUser');
            if (userStr) {
                const user = JSON.parse(userStr);
                console.log('Current user:', user);
            }

            // 显示加载状态
            showLoading();

            // 首次加载排行榜数据
            loadRankData(currentTab);

            // 连接WebSocket获取实时数据
            connect();

            // 启动定时刷新（每5秒刷新一次）
            startAutoRefresh();
        }

        function startAutoRefresh() {
            // 立即刷新一次
            loadRankData(currentTab);

            // 每5秒刷新一次排行榜
            refreshInterval = setInterval(() => {
                loadRankData(currentTab);
            }, 5000);

            console.log('✅ 排行榜自动刷新已启动 - 每5秒更新一次');
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
                console.log('⏸️ 排行榜自动刷新已停止');
            }
        }

        function showLoading() {
            document.getElementById('rankList').innerHTML = `
                <div class="empty-state">
                    <div class="loading-spinner"></div>
                    <p>加载中...</p>
                </div>
            `;
        }

        function showEmptyState(message) {
            document.getElementById('rankList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📊</div>
                    <p>${message}</p>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;

            // 更新标签状态
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');

            // 更新标题
            const titles = {
                daily: '日榜排名',
                weekly: '周榜排名',
                monthly: '月榜排名',
                all: '总榜排名'
            };
            document.getElementById('rankTitle').textContent = titles[tab];

            console.log(`🔄 切换到: ${titles[tab]}`);

            // 立即加载对应榜单数据
            loadRankData(tab);
        }

        function loadRankData(tab) {
            const now = Date.now();
            console.log(`📊 加载排行榜数据 - 标签: ${tab}, 时间: ${new Date(now).toLocaleTimeString()}`);

            // 从服务器获取排行榜数据
            fetch('/api/leaderboard?limit=50')
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.data && data.data.length > 0) {
                        rankData = data.data;
                        renderRankList(data.data);
                        updateOnlineCount();
                        lastUpdateTime = now;
                        console.log(`✅ 排行榜已更新 - ${data.data.length} 位玩家`);
                    } else {
                        showEmptyState('暂无排行数据\n请先进行对局');
                        document.getElementById('onlinePlayers').textContent = '0';
                    }
                })
                .catch(error => {
                    console.error('❌ 获取排行榜失败:', error);
                    showEmptyState('获取排行榜失败\n请稍后重试');
                    document.getElementById('onlinePlayers').textContent = '0';
                });
        }

        function renderRankList(data) {
            const container = document.getElementById('rankList');

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <p>暂无排行数据</p>
                    </div>
                `;
                return;
            }

            // 清空容器 - 使用安全的DOM方法
            container.innerHTML = '';

            // 计算胜率（需要额外获取统计数据）
            const winRate = '50'; // 默认值，实际应从user_stats表获取

            data.forEach((player, index) => {
                let rankClass = 'normal';
                if (index === 0) rankClass = 'gold';
                else if (index === 1) rankClass = 'silver';
                else if (index === 2) rankClass = 'bronze';

                const itemDiv = document.createElement('div');
                itemDiv.className = 'rank-item';

                const rankNumber = document.createElement('div');
                rankNumber.className = `rank-number ${rankClass}`;
                rankNumber.textContent = index + 1;

                const avatar = document.createElement('div');
                avatar.className = `player-avatar ${player.status > 0 ? 'online' : 'offline'}`;
                avatar.textContent = (player.nickname || '?').charAt(0);

                const info = document.createElement('div');
                info.className = 'player-info';

                const name = document.createElement('div');
                name.className = 'player-name';
                name.textContent = player.nickname || '匿名';

                const badge = document.createElement('span');
                badge.className = `online-badge ${player.status > 0 ? 'online' : 'offline'}`;
                badge.textContent = player.status > 0 ? '在线' : '离线';
                name.appendChild(badge);

                const stats = document.createElement('div');
                stats.className = 'player-stats';
                // 计算段位
                const danRank = getDanRank(player.rating || 1200);
                stats.textContent = `${danRank} | 胜率 ${winRate}%`;

                info.appendChild(name);
                info.appendChild(stats);

                const rating = document.createElement('div');
                rating.className = 'player-rating';
                rating.textContent = player.rating || 1200;

                itemDiv.appendChild(rankNumber);
                itemDiv.appendChild(avatar);
                itemDiv.appendChild(info);
                itemDiv.appendChild(rating);

                container.appendChild(itemDiv);
            });

            // 保存数据用于统计
            rankData = data;
        }

        function updateOnlineCount() {
            // 计算在线玩家数量
            const onlineCount = rankData.filter(p => p.status > 0).length;
            document.getElementById('onlinePlayers').textContent = onlineCount;
        }

        function updateOnlineStatus() {
            // 等待服务器更新在线状态
            // 实际数据通过 WebSocket 接收
        }

        function connect() {
            try {
                // 动态获取WebSocket地址 - 支持本地开发和ngrok穿透
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const hostname = window.location.hostname;
                const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
                let wsUrl;
                if (isLocalhost) {
                    wsUrl = `${protocol}//${hostname}:8083/ws`;
                } else {
                    wsUrl = `${protocol}//${window.location.host}/ws`;
                }
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('WebSocket connected for rank updates');

                    // 发送认证消息
                    const token = localStorage.getItem('token');
                    if (token) {
                        ws.send(JSON.stringify({
                            type: 100,  // TOKEN_AUTH
                            sequenceId: Date.now(),
                            timestamp: Date.now(),
                            body: { token: token }
                        }));
                        console.log('Sent authentication token');
                    } else {
                        console.warn('No auth token found');
                    }
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        // 处理排行榜更新消息
                        if (msg.type === 'RANK_UPDATE') {
                            rankData = msg.data || [];
                            renderRankList(rankData);
                        }
                    } catch (e) {
                        console.error('Message error:', e);
                    }
                };

                ws.onclose = () => {
                    console.log('WebSocket disconnected, using mock data');
                };

                ws.onerror = () => {
                    console.log('WebSocket error, using mock data');
                };
            } catch (e) {
                console.log('WebSocket connection failed, using mock data');
            }
        }

        // 根据积分获取段位
        function getDanRank(rating) {
            if (rating < 1200) {
                return '入门棋手';
            } else if (rating < 1400) {
                return '初段';
            } else if (rating < 1600) {
                return '二段';
            } else if (rating < 1800) {
                return '三段';
            } else if (rating < 2000) {
                return '四段';
            } else if (rating < 2200) {
                return '五段';
            } else if (rating < 2400) {
                return '六段';
            } else if (rating < 2600) {
                return '七段';
            } else if (rating < 2800) {
                return '八段';
            } else {
                return '九段';
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // 页面加载时初始化
        window.onload = init;

        // 页面卸载时关闭连接和停止刷新
        window.onbeforeunload = function() {
            stopAutoRefresh();
            if (ws) {
                ws.close();
            }
        };

        // 页面隐藏时停止刷新（节省资源）
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                console.log('📄 页面隐藏，暂停刷新');
                stopAutoRefresh();
            } else {
                console.log('📄 页面显示，恢复刷新');
                startAutoRefresh();
            }
        });
    </script>
</body>
</html>
