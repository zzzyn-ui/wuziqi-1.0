<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏记录 - 五子棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8dc 50%, #ffd4c4 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            box-shadow: 0 4px 20px rgba(255, 149, 0, 0.1);
            margin-bottom: 24px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .back-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff9500, #ff8c00);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            box-shadow: 0 4px 16px rgba(255, 149, 0, 0.3);
            transform: translateY(-2px);
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #eee;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: #ff9500;
            color: #ff9500;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ff9500, #ff8c00);
            border-color: #ff9500;
            color: white;
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .record-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(255, 149, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .record-card:hover {
            box-shadow: 0 4px 20px rgba(255, 149, 0, 0.2);
            transform: translateY(-2px);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .record-players {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .player-avatar.black {
            background: linear-gradient(135deg, #333, #000);
        }

        .player-avatar.white {
            background: linear-gradient(135deg, #fff, #ccc);
            color: #333;
            border: 1px solid #ddd;
        }

        .player-info {
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .player-rating {
            font-size: 12px;
            color: #999;
        }

        .vs {
            font-size: 14px;
            font-weight: 600;
            color: #ff9500;
        }

        .record-result {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .record-result.win {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
        }

        .record-result.lose {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
        }

        .record-result.draw {
            background: #f5f5f5;
            color: #666;
        }

        .record-details {
            display: flex;
            gap: 24px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .replay-btn {
            margin-left: auto;
            padding: 8px 20px;
            background: linear-gradient(135deg, #ff9500, #ff8c00);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .replay-btn:hover {
            box-shadow: 0 4px 16px rgba(255, 149, 0, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }

            .header-title h1 {
                font-size: 20px;
            }

            .record-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .record-details {
                flex-wrap: wrap;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <button class="back-btn" onclick="goBack()">← 返回</button>
                <h1>游戏记录</h1>
            </div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="win">胜利</button>
            <button class="filter-btn" data-filter="lose">失败</button>
            <button class="filter-btn" data-filter="pvp_online">在线对战</button>
            <button class="filter-btn" data-filter="pve">人机对战</button>
        </div>

        <div class="records-list" id="recordsList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // 获取API基础URL
        const API_BASE = AppConfig.getApiBaseUrl();

        let records = [];
        let currentFilter = 'all';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadRecords();
            setupFilters();
        });

        // 设置筛选按钮
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderRecords();
                });
            });
        }

        // 加载游戏记录
        async function loadRecords() {
            console.log('=== 开始加载游戏记录 ===');
            console.log('API_BASE:', API_BASE);

            try {
                const token = localStorage.getItem('authToken') || localStorage.getItem('token');
                console.log('Token:', token ? '存在' : '不存在');

                if (!token) {
                    alert('请先登录');
                    window.location.href = 'login.html';
                    return;
                }

                const url = `${API_BASE}/records/my?limit=100`;
                console.log('请求URL:', url);

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                console.log('响应状态:', response.status);

                const result = await response.json();
                console.log('响应结果:', result);

                if (result.success && result.records) {
                    records = result.records;
                    console.log('获取到的记录数:', records.length);
                    renderRecords();
                } else {
                    console.error('API返回失败:', result);
                    document.getElementById('recordsList').innerHTML = `
                        <div class="empty-state">
                            <p>${result.message || '加载失败'}</p>
                            <p style="font-size: 12px; color: #666;">错误信息: ${JSON.stringify(result)}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载游戏记录失败:', error);
                document.getElementById('recordsList').innerHTML = `
                    <div class="empty-state">
                        <p>加载失败，请稍后重试</p>
                        <p style="font-size: 12px; color: #666;">错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        // 渲染记录列表
        function renderRecords() {
            const container = document.getElementById('recordsList');

            // 筛选记录
            let filteredRecords = records;
            if (currentFilter === 'win') {
                filteredRecords = records.filter(r => r.result === 'win');
            } else if (currentFilter === 'lose') {
                filteredRecords = records.filter(r => r.result === 'lose');
            } else if (currentFilter === 'pvp_online') {
                filteredRecords = records.filter(r => r.gameMode === 'pvp_online');
            } else if (currentFilter === 'pve') {
                filteredRecords = records.filter(r => r.gameMode === 'pve');
            }

            if (filteredRecords.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 8v4l3 3"/>
                        </svg>
                        <p>暂无游戏记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredRecords.map(record => createRecordCard(record)).join('');
        }

        // 创建记录卡片
        function createRecordCard(record) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            const myColor = record.myColor;

            const resultText = record.result === 'win' ? '胜利' : (record.result === 'lose' ? '失败' : '平局');
            const resultClass = record.result;

            const gameModeText = record.gameMode === 'pvp_online' ? '在线对战' :
                                 record.gameMode === 'pve' ? '人机对战' :
                                 record.gameMode === 'pvp_local' ? '本地对战' : '未知模式';

            const duration = record.duration ? Math.round(record.duration / 60) : 0;
            const date = record.createdAt ? new Date(record.createdAt).toLocaleString('zh-CN') : '-';

            return `
                <div class="record-card" onclick="viewReplay('${record.roomId}')">
                    <div class="record-header">
                        <div class="record-players">
                            <div class="player">
                                <div class="player-avatar black">黑</div>
                                <div class="player-info">
                                    <span class="player-name">${myColor === 'black' ? '我' : (record.opponent?.nickname || '对手')}</span>
                                    <span class="player-rating">${myColor === 'black' ? '' : (record.opponent?.rating || 1200)}</span>
                                </div>
                            </div>
                            <span class="vs">VS</span>
                            <div class="player">
                                <div class="player-avatar white">白</div>
                                <div class="player-info">
                                    <span class="player-name">${myColor === 'white' ? '我' : (record.opponent?.nickname || '对手')}</span>
                                    <span class="player-rating">${myColor === 'white' ? '' : (record.opponent?.rating || 1200)}</span>
                                </div>
                            </div>
                        </div>
                        <span class="record-result ${resultClass}">${resultText}</span>
                    </div>
                    <div class="record-details">
                        <div class="detail-item">
                            <span class="detail-label">对局模式</span>
                            <span class="detail-value">${gameModeText}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">手数</span>
                            <span class="detail-value">${record.moveCount || 0} 手</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">时长</span>
                            <span class="detail-value">${duration} 分钟</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">对局时间</span>
                            <span class="detail-value">${date}</span>
                        </div>
                        <button class="replay-btn" onclick="event.stopPropagation(); viewReplay('${record.roomId}')">
                            📺 复盘
                        </button>
                    </div>
                </div>
            `;
        }

        // 查看复盘
        function viewReplay(roomId) {
            window.location.href = `replay.html?roomId=${roomId}`;
        }

        // 返回
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
