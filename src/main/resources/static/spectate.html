<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观战模式 - 五子棋对战平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8dc 50%, #ffd4c4 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            max-width: 1200px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            color: #ff6b35;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .back-btn:hover {
            box-shadow: 0 4px 12px rgba(255,107,53,0.2);
            transform: translateY(-2px);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ff6b35;
            margin-bottom: 30px;
        }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .room-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(255,107,53,0.2);
        }
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .room-id {
            font-size: 14px;
            color: #999;
        }
        .game-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .game-status.playing {
            background: #e3f2fd;
            color: #1976d2;
        }
        .players {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .player {
            text-align: center;
            flex: 1;
        }
        .player-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .player-rating {
            font-size: 12px;
            color: #999;
        }
        .vs {
            display: flex;
            align-items: center;
            color: #ff6b35;
            font-weight: bold;
        }
        .room-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }
        .spectate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .spectate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
        }
        .observers-list {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 100px;
            overflow-y: auto;
        }
        .observer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .observer-item:last-child {
            border-bottom: none;
        }
        .observer-avatar {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #ff6b35, #ff8c61);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .observer-name {
            color: #333;
            flex: 1;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div style="color: #666; font-size: 14px;">实时观战精彩对局</div>
    </div>

    <div class="container">
        <h1>👀 观战模式</h1>

        <div id="roomsContainer" class="rooms-grid">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        let refreshInterval = null;

        // 加载观战房间
        async function loadRooms() {
            try {
                const response = await fetch('/api/rooms/playing');
                const data = await response.json();

                if (data.success && data.data) {
                    const rooms = data.data.rooms || [];
                    displayRooms(rooms);
                } else {
                    displayRooms([]);
                }
            } catch (error) {
                console.error('Failed to load rooms:', error);
                document.getElementById('roomsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>加载失败，请刷新页面重试</p>
                    </div>
                `;
            }
        }

        // 显示房间列表
        function displayRooms(rooms) {
            const container = document.getElementById('roomsContainer');

            if (rooms.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎮</div>
                        <p>暂时没有正在进行的对局</p>
                        <p style="font-size: 14px; margin-top: 10px;">系统会自动刷新，请稍后再来</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const blackPlayer = room.black_player || {};
                const whitePlayer = room.white_player || {};

                return `
                    <div class="room-card">
                        <div class="room-header">
                            <span class="room-id">房间: ${room.room_id}</span>
                            <span class="game-status playing">进行中</span>
                        </div>
                        <div class="players">
                            <div class="player">
                                <div style="font-size: 24px; margin-bottom: 8px;">⚫</div>
                                <div class="player-name">${blackPlayer.nickname || '黑方'}</div>
                                <div class="player-rating">${blackPlayer.rating || 1200} 分</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="player">
                                <div style="font-size: 24px; margin-bottom: 8px;">⚪</div>
                                <div class="player-name">${whitePlayer.nickname || '白方'}</div>
                                <div class="player-rating">${whitePlayer.rating || 1200} 分</div>
                            </div>
                        </div>
                        <div class="room-info">
                            <span>🎯 ${room.move_count || 0} 手</span>
                            <span>👥 ${room.observer_count || 0} 人观战</span>
                        </div>
                        <div class="observers-list" id="observers-${room.room_id}">
                            <div style="text-align:center; color:#999; font-size:12px;">加载中...</div>
                        </div>
                        <button class="spectate-btn" onclick="spectate('${room.room_id}')">
                            加入观战
                        </button>
                    </div>
                `;
            }).join('');

            // 加载每个房间的观战者列表
            rooms.forEach(room => {
                loadObservers(room.room_id);
            });
        }

        // 加载观战者列表
        async function loadObservers(roomId) {
            try {
                const response = await fetch(`/api/rooms/${roomId}/observers`);
                const data = await response.json();

                const container = document.getElementById(`observers-${roomId}`);
                if (container) {
                    if (data.success && data.data) {
                        const observers = data.data.observers || [];
                        if (observers.length === 0) {
                            container.innerHTML = '<div style="text-align:center; color:#999; font-size:12px;">暂无观战者</div>';
                        } else {
                            container.innerHTML = observers.map(observer => {
                                const initial = observer.nickname ? observer.nickname.charAt(0).toUpperCase() : '?';
                                return `
                                    <div class="observer-item">
                                        <div class="observer-avatar">${initial}</div>
                                        <span class="observer-name">${observer.nickname || observer.username || '匿名'}</span>
                                    </div>
                                `;
                            }).join('');
                        }
                    } else {
                        container.innerHTML = '<div style="text-align:center; color:#999; font-size:12px;">无法加载</div>';
                    }
                }
            } catch (error) {
                console.error('Failed to load observers:', error);
            }
        }

        // 加入观战
        function spectate(roomId) {
            // 保存房间ID到 localStorage
            localStorage.setItem('spectateRoomId', roomId);
            // 跳转到游戏页面
            window.location.href = `game.html?mode=spectate&room=${roomId}`;
        }

        // 页面加载时初始化
        window.onload = function() {
            loadRooms();
            // 每5秒刷新一次
            refreshInterval = setInterval(loadRooms, 5000);
        };

        // 页面卸载时清除定时器
        window.onbeforeunload = function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        };
    </script>
</body>
</html>
