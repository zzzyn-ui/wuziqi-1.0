<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>前端连接测试</title>
</head>
<body>
    <h1>五子棋前端连接测试</h1>

    <div id="status">
        <p>状态: <span id="statusText">检查中...</span></p>
    </div>

    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function addResult(test, passed, message) {
            const div = document.createElement('div');
            div.style.padding = '10px';
            div.style.margin = '5px 0';
            div.style.borderRadius = '5px';
            div.style.background = passed ? '#d4edda' : '#f8d7da';
            div.textContent = `${passed ? '✅' : '❌'} ${test}: ${message}`;
            results.appendChild(div);
        }

        async function testHealthAPI() {
            try {
                const response = await fetch('http://localhost:8083/api/health');
                const data = await response.json();
                addResult('健康检查API', true, JSON.stringify(data));
            } catch (error) {
                addResult('健康检查API', false, error.message);
            }
        }

        async function testWebSocket() {
            return new Promise((resolve) => {
                const ws = new WebSocket('ws://localhost:8083/ws');

                ws.onopen = () => {
                    addResult('WebSocket连接', true, '连接成功');
                    ws.close();
                    resolve();
                };

                ws.onerror = (error) => {
                    addResult('WebSocket连接', false, '连接失败');
                    resolve();
                };

                ws.onclose = () => {
                    resolve();
                };

                setTimeout(() => {
                    addResult('WebSocket连接', false, '连接超时');
                    resolve();
                }, 5000);
            });
        }

        async function testStaticFile() {
            try {
                const response = await fetch('http://localhost:8083/login.html');
                const text = await response.text();
                if (text.includes('五子棋在线对战')) {
                    addResult('静态文件', true, 'login.html加载成功');
                } else {
                    addResult('静态文件', false, '内容不匹配');
                }
            } catch (error) {
                addResult('静态文件', false, error.message);
            }
        }

        async function runTests() {
            document.getElementById('statusText').textContent = '测试中...';

            await testHealthAPI();
            await testStaticFile();
            await testWebSocket();

            document.getElementById('statusText').textContent = '测试完成';
        }

        runTests();
    </script>
</body>
</html>
