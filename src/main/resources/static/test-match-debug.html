<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匹配调试工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            grid-column: 1 / -1;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }
        h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 18px;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .log {
            background: #1e1e1e;
            color: #00ff00;
            padding: 16px;
            border-radius: 8px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            margin-top: 16px;
        }
        .log-entry {
            margin-bottom: 4px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .log-entry.info { color: #60a5fa; }
        .log-entry.success { color: #4ade80; }
        .log-entry.error { color: #f87171; }
        .log-entry.warn { color: #fbbf24; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }
        .info-box {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .info-box p {
            margin-bottom: 8px;
            color: #666;
            font-size: 13px;
        }
        .user-id {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            padding: 16px;
            background: #f3f4f6;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <h1>🎮 五子棋匹配调试工具</h1>

    <div class="container">
        <!-- 左侧面板：玩家1 -->
        <div class="panel" id="player1">
            <h2>👤 玩家 1</h2>
            <div class="user-id" id="userId1">未连接</div>

            <div class="status offline" id="status1">⚫ WebSocket 未连接</div>

            <label>用户名</label>
            <input type="text" id="username1" placeholder="输入用户名" value="player1">

            <label>昵称</label>
            <input type="text" id="nickname1" placeholder="输入昵称" value="玩家1">

            <label>密码</label>
            <input type="password" id="password1" placeholder="输入密码（可选）" value="123456">

            <label>游戏模式</label>
            <select id="mode1">
                <option value="casual">休闲模式 (casual)</option>
                <option value="ranked">竞技模式 (ranked)</option>
            </select>

            <button class="btn btn-primary" onclick="login(1)">登录 / 连接</button>
            <button class="btn btn-success" onclick="startMatch(1)" id="matchBtn1" disabled>开始匹配</button>
            <button class="btn btn-danger" onclick="cancelMatch(1)" id="cancelBtn1" disabled>取消匹配</button>

            <div class="info-box">
                <p><strong>当前状态:</strong> <span id="state1">未登录</span></p>
                <p><strong>匹配模式:</strong> <span id="currentMode1">-</span></p>
            </div>
        </div>

        <!-- 右侧面板：玩家2 -->
        <div class="panel" id="player2">
            <h2>👤 玩家 2</h2>
            <div class="user-id" id="userId2">未连接</div>

            <div class="status offline" id="status2">⚫ WebSocket 未连接</div>

            <label>用户名</label>
            <input type="text" id="username2" placeholder="输入用户名" value="player2">

            <label>昵称</label>
            <input type="text" id="nickname2" placeholder="输入昵称" value="玩家2">

            <label>密码</label>
            <input type="password" id="password2" placeholder="输入密码（可选）" value="123456">

            <label>游戏模式</label>
            <select id="mode2">
                <option value="casual">休闲模式 (casual)</option>
                <option value="ranked">竞技模式 (ranked)</option>
            </select>

            <button class="btn btn-primary" onclick="login(2)">登录 / 连接</button>
            <button class="btn btn-success" onclick="startMatch(2)" id="matchBtn2" disabled>开始匹配</button>
            <button class="btn btn-danger" onclick="cancelMatch(2)" id="cancelBtn2" disabled>取消匹配</button>

            <div class="info-box">
                <p><strong>当前状态:</strong> <span id="state2">未登录</span></p>
                <p><strong>匹配模式:</strong> <span id="currentMode2">-</span></p>
            </div>
        </div>
    </div>

    <!-- 日志面板 -->
    <div class="panel" style="margin-top: 20px;">
        <h2>📋 调试日志</h2>
        <div class="log" id="log"></div>
    </div>

    <script>
        // 为两个玩家创建独立的连接
        const players = {
            1: { ws: null, userId: null, token: null, state: 'idle', sequenceId: 0 },
            2: { ws: null, userId: null, token: null, state: 'idle', sequenceId: 0 }
        };

        const MessageType = {
            AUTH_LOGIN: 1,
            AUTH_REGISTER: 2,
            AUTH_RESPONSE: 3,
            MATCH_START: 10,
            MATCH_CANCEL: 11,
            MATCH_SUCCESS: 12,
            MATCH_FAILED: 13,
            GAME_START: 14
        };

        function log(playerNum, message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] [玩家${playerNum}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[玩家${playerNum}]`, message);
        }

        function updateStatus(playerNum, online) {
            const statusDiv = document.getElementById(`status${playerNum}`);
            if (online) {
                statusDiv.className = 'status online';
                statusDiv.textContent = '🟢 WebSocket 已连接';
            } else {
                statusDiv.className = 'status offline';
                statusDiv.textContent = '⚫ WebSocket 未连接';
            }
        }

        function updateState(playerNum, state) {
            players[playerNum].state = state;
            document.getElementById(`state${playerNum}`).textContent = state;

            const matchBtn = document.getElementById(`matchBtn${playerNum}`);
            const cancelBtn = document.getElementById(`cancelBtn${playerNum}`);

            if (state === 'matching') {
                matchBtn.disabled = true;
                cancelBtn.disabled = false;
            } else if (state === 'logged') {
                matchBtn.disabled = false;
                cancelBtn.disabled = true;
            } else {
                matchBtn.disabled = true;
                cancelBtn.disabled = true;
            }
        }

        function login(playerNum) {
            const username = document.getElementById(`username${playerNum}`).value.trim();
            const nickname = document.getElementById(`nickname${playerNum}`).value.trim();
            const password = document.getElementById(`password${playerNum}`).value;

            if (!username || !nickname) {
                log(playerNum, '请输入用户名和昵称', 'error');
                return;
            }

            log(playerNum, `正在登录: ${username} (${nickname})`, 'info');

            // 创建 WebSocket 连接
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const hostname = window.location.hostname;
            const wsPort = '8083';
            const wsUrl = `${protocol}//${hostname}:${wsPort}/ws`;

            log(playerNum, `连接到: ${wsUrl}`, 'info');

            const player = players[playerNum];

            // 关闭旧连接
            if (player.ws) {
                player.ws.close();
            }

            player.ws = new WebSocket(wsUrl);
            player.sequenceId = 0;

            player.ws.onopen = () => {
                log(playerNum, '✓ WebSocket 连接成功', 'success');
                updateStatus(playerNum, true);

                // 发送登录消息
                player.ws.send(JSON.stringify({
                    type: MessageType.AUTH_LOGIN,
                    sequenceId: ++player.sequenceId,
                    timestamp: Date.now(),
                    body: {
                        username: username,
                        password: password || '123456'
                    }
                }));
                log(playerNum, '已发送登录请求', 'info');
            };

            player.ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    log(playerNum, `收到消息: type=${msg.type}, ${JSON.stringify(msg.body || '')}`, 'info');
                    handleMessage(playerNum, msg);
                } catch (e) {
                    log(playerNum, `消息解析错误: ${e.message}`, 'error');
                }
            };

            player.ws.onclose = (event) => {
                log(playerNum, `WebSocket 连接关闭: code=${event.code}`, 'warn');
                updateStatus(playerNum, false);
                updateState(playerNum, 'idle');
            };

            player.ws.onerror = (error) => {
                log(playerNum, 'WebSocket 错误', 'error');
            };
        }

        function handleMessage(playerNum, msg) {
            const player = players[playerNum];

            switch (msg.type) {
                case MessageType.AUTH_RESPONSE:
                    if (msg.body && msg.body.success) {
                        player.userId = msg.body.user_info?.user_id || msg.body.user_info?.userId;
                        player.token = msg.body.token;
                        document.getElementById(`userId${playerNum}`).textContent = `ID: ${player.userId}`;
                        log(playerNum, `✓ 登录成功! 用户ID: ${player.userId}`, 'success');
                        updateState(playerNum, 'logged');
                    } else {
                        log(playerNum, `✗ 登录失败: ${msg.body?.message || '未知错误'}`, 'error');
                    }
                    break;

                case MessageType.MATCH_START:
                    log(playerNum, '✓ 已加入匹配队列', 'success');
                    updateState(playerNum, 'matching');
                    break;

                case MessageType.MATCH_SUCCESS:
                    log(playerNum, `🎉 匹配成功! 房间: ${msg.body?.room_id || msg.body?.roomId}`, 'success');
                    log(playerNum, `执棋: ${msg.body?.is_first ? '黑棋' : '白棋'}`, 'info');
                    updateState(playerNum, 'matched');
                    break;

                case MessageType.MATCH_FAILED:
                    log(playerNum, `✗ 匹配失败: ${msg.body?.reason || '未知原因'}`, 'error');
                    updateState(playerNum, 'logged');
                    break;

                case MessageType.GAME_START:
                    log(playerNum, `🎮 游戏开始! 房间: ${msg.body?.room_id}`, 'success');
                    window.location.href = `game.html?room=${msg.body?.room_id}`;
                    break;
            }
        }

        function startMatch(playerNum) {
            const player = players[playerNum];
            const mode = document.getElementById(`mode${playerNum}`).value;
            const nickname = document.getElementById(`nickname${playerNum}`).value;

            log(playerNum, `开始匹配，模式: ${mode}`, 'info');
            document.getElementById(`currentMode${playerNum}`).textContent = mode;

            player.ws.send(JSON.stringify({
                type: MessageType.MATCH_START,
                sequenceId: ++player.sequenceId,
                timestamp: Date.now(),
                body: {
                    rating: 1200,
                    mode: mode,
                    timeout: 300
                }
            }));
        }

        function cancelMatch(playerNum) {
            const player = players[playerNum];
            log(playerNum, '取消匹配', 'warn');

            player.ws.send(JSON.stringify({
                type: MessageType.MATCH_CANCEL,
                sequenceId: ++player.sequenceId,
                timestamp: Date.now()
            }));
        }

        // 页面加载时检查健康状态
        window.onload = async function() {
            log(0, '===== 匹配调试工具启动 =====', 'info');

            try {
                const response = await fetch('http://localhost:8083/api/health');
                if (response.ok) {
                    const data = await response.json();
                    log(0, `✓ 服务器在线: ${data.websocket}`, 'success');
                } else {
                    log(0, '✗ 服务器响应异常', 'error');
                }
            } catch (e) {
                log(0, `✗ 无法连接到服务器: ${e.message}`, 'error');
            }
        };

        function log(playerNum, message, type) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            const prefix = playerNum === 0 ? '[系统]' : `[玩家${playerNum}]`;
            entry.textContent = `[${time}] ${prefix} ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>
</html>
