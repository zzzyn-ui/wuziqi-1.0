<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匹配测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .test-section { margin-bottom: 20px; }
        .test-section h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-casual {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-ranked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-back {
            background: #6c757d;
            color: white;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        #log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry { padding: 3px 0; border-bottom: 1px solid #333; }
        .log-info { color: #4ec9b0; }
        .log-success { color: #6a9955; }
        .log-error { color: #f48771; }
        .log-warn { color: #dcdcaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 匹配测试工具</h1>

        <div class="test-section">
            <h2>测试步骤：</h2>
            <ol style="padding-left: 20px; color: #666; font-size: 14px;">
                <li>打开两个浏览器窗口</li>
                <li>两个窗口都访问此页面</li>
                <li>一个点击"休闲模式匹配"</li>
                <li>另一个点击"竞技模式匹配"</li>
                <li>观察日志输出</li>
            </ol>
        </div>

        <div class="button-group">
            <button class="btn-casual" onclick="testMatch('casual')">🎮 休闲模式匹配</button>
            <button class="btn-ranked" onclick="testMatch('ranked')">⚔️ 竞技模式匹配</button>
        </div>

        <div class="button-group">
            <button class="btn-back" onclick="cancelMatch()">❌ 取消匹配</button>
            <button class="btn-back" onclick="clearLog()">🗑️ 清除日志</button>
            <button class="btn-back" onclick="goBack()">🏠 返回首页</button>
        </div>

        <div class="test-section">
            <h2>日志输出：<label style="font-size: 12px; font-weight: normal;"><input type="checkbox" id="pauseLog" onchange="togglePauseLog()"> 暂停日志</label></h2>
            <div id="log"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentMode = null;
        let logPaused = false;

        function togglePauseLog() {
            logPaused = document.getElementById('pauseLog').checked;
            log(logPaused ? '日志已暂停，不再更新' : '日志已恢复');
        }

        function log(message, type = 'info') {
            if (logPaused && type !== 'error') return;  // 暂停时不添加新日志（除了错误）

            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const hostname = window.location.hostname;
            const wsPort = '8083';
            const wsUrl = `${protocol}//${hostname}:${wsPort}/ws`;

            log(`连接到WebSocket: ${wsUrl}`, 'info');
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log('WebSocket连接成功', 'success');
                // 发送认证
                const authToken = localStorage.getItem('authToken') || localStorage.getItem('gobang_token');
                if (authToken) {
                    ws.send(JSON.stringify({
                        type: 100,
                        sequence_id: Date.now(),
                        timestamp: Date.now(),
                        body: { token: authToken }
                    }));
                    log('已发送认证消息', 'info');
                }
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    log(`收到消息: type=${data.type}`, 'info');

                    if (data.type === 12) { // MATCH_SUCCESS
                        const roomId = data.body?.room_id || data.room_id;
                        log(`✓ 匹配成功！房间号: ${roomId}`, 'success');
                        log(`游戏模式: ${currentMode}`, 'info');

                        setTimeout(() => {
                            if (confirm(`匹配成功！\n房间号: ${roomId}\n您的模式: ${currentMode}\n\n是否进入游戏？`)) {
                                window.location.href = `game.html?room=${encodeURIComponent(roomId)}`;
                            }
                        }, 500);
                    } else if (data.type === 13) { // MATCH_FAILED
                        log(`✗ 匹配失败: ${data.body?.reason || data.reason}`, 'error');
                    }
                } catch (e) {
                    log(`消息解析错误: ${e.message}`, 'error');
                }
            };

            ws.onerror = (error) => {
                log('WebSocket错误', 'error');
            };

            ws.onclose = () => {
                log('WebSocket连接关闭', 'warn');
            };
        }

        function testMatch(mode) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connectWebSocket();
                setTimeout(() => testMatch(mode), 1000);
                return;
            }

            currentMode = mode;
            const modeName = mode === 'casual' ? '休闲' : '竞技';

            log(`开始${modeName}模式匹配...`, 'info');

            // 获取用户信息
            const authToken = localStorage.getItem('authToken') || localStorage.getItem('gobang_token');

            // 解析JWT获取用户信息（简单方式）
            let rating = 1200;
            try {
                if (authToken) {
                    const parts = authToken.split('.');
                    if (parts.length === 3) {
                        const payload = JSON.parse(atob(parts[1]));
                        rating = payload.rating || 1200;
                        log(`用户积分: ${rating}`, 'info');
                    }
                }
            } catch (e) {
                log('无法获取用户积分，使用默认值1200', 'warn');
            }

            const message = {
                type: 10, // MATCH_START
                body: {
                    mode: mode,
                    rating: rating
                }
            };

            ws.send(JSON.stringify(message));
            log(`已发送匹配请求: mode=${mode}, rating=${rating}`, 'success');
        }

        function cancelMatch() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 11 }));
                log('已发送取消匹配请求', 'info');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('日志已清除', 'info');
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // 页面加载时自动连接
        window.onload = () => {
            log('匹配测试工具已加载', 'success');
            log('请点击匹配按钮开始测试', 'info');
            connectWebSocket();
        };
    </script>
</body>
</html>
