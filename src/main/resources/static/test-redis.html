<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis 状态检查</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; }
        h1 { color: #333; margin-bottom: 20px; }
        .status { padding: 15px; margin: 10px 0; border-radius: 8px; }
        .status.ok { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        button { padding: 12px 24px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        pre { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 6px; overflow-x: auto; }
        .player-list { margin-top: 20px; }
        .player { background: #f8f9fa; padding: 10px; margin: 5px 0; border-left: 4px solid #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Redis 匹配队列状态</h1>

        <div id="healthStatus" class="status info">检查服务器状态中...</div>
        <div id="redisStatus" class="status info">检查 Redis 状态中...</div>

        <button class="btn-primary" onclick="checkStatus()">🔄 刷新状态</button>
        <button class="btn-success" onclick="checkQueues()">📊 检查匹配队列</button>

        <div id="queueInfo" class="player-list" style="display:none;">
            <h2>匹配队列中的玩家:</h2>
            <div id="players"></div>
        </div>

        <pre id="log"></pre>
    </div>

    <script>
        function log(msg) {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.textContent = `[${time}] ${msg}\n` + logDiv.textContent;
        }

        async function checkStatus() {
            log('=== 检查服务器状态 ===');
            try {
                const response = await fetch('http://localhost:8083/api/health');
                const data = await response.json();
                document.getElementById('healthStatus').className = 'status ok';
                document.getElementById('healthStatus').textContent = `✓ 服务器在线: ${data.websocket}`;
                log(`服务器状态: ${JSON.stringify(data, null, 2)}`);
            } catch (e) {
                document.getElementById('healthStatus').className = 'status error';
                document.getElementById('healthStatus').textContent = `✗ 服务器离线: ${e.message}`;
                log(`服务器错误: ${e.message}`);
            }
        }

        async function checkQueues() {
            log('=== 检查匹配队列 ===');
            document.getElementById('queueInfo').style.display = 'none';

            try {
                // 获取排行榜来测试数据库连接
                const response = await fetch('http://localhost:8083/api/rank?limit=10');
                const data = await response.json();

                if (data.success && data.data) {
                    document.getElementById('redisStatus').className = 'status ok';
                    document.getElementById('redisStatus').textContent = `✓ 数据库连接正常，当前在线用户: ${data.data.length} 人`;
                    log(`排行榜数据: ${data.data.length} 位玩家`);

                    document.getElementById('queueInfo').style.display = 'block';
                    const playersDiv = document.getElementById('players');
                    playersDiv.innerHTML = '';

                    data.data.forEach((player, index) => {
                        const playerDiv = document.createElement('div');
                        playerDiv.className = 'player';
                        playerDiv.innerHTML = `
                            <strong>#${index + 1}</strong> ${player.nickname || player.username}
                            (积分: ${player.rating}, 等级: ${player.level})
                        `;
                        playersDiv.appendChild(playerDiv);
                    });
                }
            } catch (e) {
                document.getElementById('redisStatus').className = 'status error';
                document.getElementById('redisStatus').textContent = `✗ 无法获取数据: ${e.message}`;
                log(`错误: ${e.message}`);
            }
        }

        // 页面加载时自动检查
        window.onload = function() {
            log('页面加载完成');
            checkStatus();
            checkQueues();
        };
    </script>
</body>
</html>
